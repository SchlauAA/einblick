<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Einblick</title>
<style>

body{
background:#0a0a0a;
color:#e6e6e6;
font-family:Helvetica,Arial,sans-serif;
margin:0;
display:flex;
justify-content:center;
}

.container{
width:1200px;
padding:40px 0;
}

h1{
font-weight:500;
letter-spacing:4px;
text-align:center;
margin-bottom:10px;
}

.concierge{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:40px;
}

.eye{
width:80px;
height:80px;
border:3px solid #e6e6e6;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
position:relative;
}

.pupil{
width:20px;
height:20px;
background:#e6e6e6;
border-radius:50%;
position:absolute;
}

.widgets{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.widget{
aspect-ratio:1/1;
border:1px solid #333;
padding:15px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

.clock{
font-size:28px;
margin-top:10px;
}

canvas{
width:120px;
height:120px;
}

.search{
border:1px solid #333;
height:70px;
display:flex;
align-items:center;
padding:0 15px;
margin-bottom:40px;
}

.search input{
flex:1;
background:none;
border:none;
outline:none;
color:#e6e6e6;
font-size:18px;
}

.workspace{
border:1px solid #333;
height:180px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:40px;
}

.panels{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.panel{
aspect-ratio:1/1;
border:1px solid #333;
display:flex;
align-items:center;
justify-content:center;
transition:all .2s;
}

.panel:hover{
box-shadow:0 0 10px #888;
}

.reflection{
border:1px solid #333;
padding:25px;
text-align:center;
margin-bottom:20px;
}

.credit{
text-align:center;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<div class="concierge">
<div class="eye">
<div class="pupil" id="pupil"></div>
</div>
<h1>EINBLICK</h1>
</div>

<div class="widgets">

<div class="widget">
<canvas id="analogClock"></canvas>
<div class="clock" id="digitalClock"></div>
</div>

<div class="widget">
<div id="calendarDay"></div>
<div id="calendarDate"></div>
</div>

<div class="widget">
<div>News</div>
</div>

<div class="widget">
<div>Weather</div>
</div>

</div>

<div class="search">
<input placeholder="Search Einblick knowledge system">
</div>

<div class="workspace">
Workspace
</div>

<div class="panels">

<div class="panel">Instruments</div>
<div class="panel">Atlas</div>
<div class="panel">Courses</div>
<div class="panel">Research</div>

<div class="panel">Library</div>
<div class="panel">Translator</div>
<div class="panel">Data</div>
<div class="panel">Settings</div>

</div>

<div class="reflection">
“The important thing is not to stop questioning.”  
<br>Albert Einstein
</div>

<div class="credit">
Created by Dr. Aishvarya Adhaulia
</div>

</div>

<script>

function updateClock(){
const now=new Date()
document.getElementById("digitalClock").innerText=
now.toLocaleTimeString()
}

setInterval(updateClock,1000)

function updateCalendar(){
const now=new Date()
document.getElementById("calendarDay").innerText=
now.toLocaleDateString(undefined,{weekday:"long"})
document.getElementById("calendarDate").innerText=
now.toLocaleDateString()
}

updateCalendar()

const canvas=document.getElementById("analogClock")
const ctx=canvas.getContext("2d")
canvas.width=200
canvas.height=200

function drawClock(){
const now=new Date()
const sec=now.getSeconds()
const min=now.getMinutes()
const hr=now.getHours()

ctx.clearRect(0,0,200,200)

ctx.beginPath()
ctx.arc(100,100,90,0,Math.PI*2)
ctx.strokeStyle="#e6e6e6"
ctx.stroke()

ctx.beginPath()
ctx.moveTo(100,100)
ctx.lineTo(
100+50*Math.cos((hr%12+min/60)*Math.PI/6-Math.PI/2),
100+50*Math.sin((hr%12+min/60)*Math.PI/6-Math.PI/2)
)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(100,100)
ctx.lineTo(
100+70*Math.cos(min*Math.PI/30-Math.PI/2),
100+70*Math.sin(min*Math.PI/30-Math.PI/2)
)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(100,100)
ctx.lineTo(
100+80*Math.cos(sec*Math.PI/30-Math.PI/2),
100+80*Math.sin(sec*Math.PI/30-Math.PI/2)
)
ctx.stroke()

}

setInterval(drawClock,1000)

document.addEventListener("mousemove",function(e){
const pupil=document.getElementById("pupil")
const x=(e.clientX/window.innerWidth-0.5)*20
const y=(e.clientY/window.innerHeight-0.5)*20
pupil.style.transform=`translate(${x}px,${y}px)`
})

function blink(){
const eye=document.querySelector(".eye")
eye.style.height="10px"
setTimeout(()=>eye.style.height="80px",200)
}

setInterval(blink,5000)

</script>

</body>
</html>
