<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einblick</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
background:radial-gradient(circle at top,#0f1d3a 0%,#05070d 60%,#000 100%);
color:#e8e8e8;
display:flex;
justify-content:center;
}

/* MASTER CONTAINER */

.container{
width:92%;
max-width:1100px;
padding:60px 0;
}

/* EVERY ZONE SAME WIDTH */

.zone{
width:100%;
margin-bottom:48px;
}

/* CENTERED TEXT ZONES */

.center{
text-align:center;
}

/* LOGO */

.logo-eye{
display:flex;
justify-content:center;
margin-bottom:16px;
}

.eye{
width:80px;
height:50px;
border:2px solid #cfd3dc;
border-radius:50px/30px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.pupil{
width:14px;
height:14px;
background:#cfd3dc;
border-radius:50%;
box-shadow:0 0 8px rgba(140,160,255,.6);
}

/* BRAND */

.brand-name{
font-size:36px;
font-weight:600;
margin-bottom:6px;
text-align:center;
}

.slogan{
color:#9aa0aa;
text-align:center;
}

/* WIDGET GRID */

.widget-row{
width:100%;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
margin-top:48px;
}

.widget{
width:100%;
aspect-ratio:1/1;
background:#14161c;
border:1px solid #23252d;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
transition:.22s;
}

.widget:hover{
transform:scale(1.04);
border-color:#5b7cff;
box-shadow:0 0 8px rgba(120,140,255,.25);
}

/* CLOCK */

.clock{
width:70px;
height:70px;
border:2px solid #cfd3dc;
border-radius:50%;
position:relative;
margin-bottom:10px;
}

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
background:#cfd3dc;
}

.hour{width:3px;height:20px;}
.minute{width:2px;height:28px;}
.second{width:1px;height:32px;background:#8aa4ff;}

.digital{
font-size:14px;
}

/* CALENDAR */

.calendar-day{
font-size:18px;
font-weight:500;
}

.calendar-date{
font-size:14px;
color:#9aa0aa;
}

/* SEARCH PANEL */

.search-panel{
width:100%;
display:flex;
background:#14161c;
border:1px solid #23252d;
border-radius:12px;
overflow:hidden;
}

.attach{
width:60px;
display:flex;
align-items:center;
justify-content:center;
border-right:1px solid #23252d;
cursor:pointer;
}

.search-input{
flex:1;
background:transparent;
border:none;
color:white;
padding:16px;
font-size:16px;
}

.search-input:focus{
outline:none;
}

.search-btn{
width:120px;
background:#1c1f28;
border:none;
color:white;
cursor:pointer;
}

/* REFLECTION */

.reflection{
width:100%;
background:#14161c;
border:1px solid #23252d;
border-radius:12px;
padding:28px;
text-align:center;
}

.reflection-title{
color:#9aa0aa;
margin-bottom:12px;
}

.quote{
font-size:18px;
margin-bottom:10px;
}

.author{
color:#9aa0aa;
}

/* PANELS GRID */

.panel-row{
width:100%;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:18px;
}

.panel{
width:100%;
aspect-ratio:1/1;
background:#14161c;
border:1px solid #23252d;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
transition:.22s;
}

.panel svg{
width:26px;
height:26px;
stroke:#cfd3dc;
stroke-width:1.8;
fill:none;
}

.panel:hover{
transform:scale(1.04);
border-color:#5b7cff;
box-shadow:0 0 8px rgba(120,140,255,.25);
}

/* FOOTER */

.footer{
text-align:center;
color:#888;
font-size:14px;
margin-top:36px;
}

</style>
</head>

<body>

<div class="container">

<!-- ZONE 1 -->

<div class="zone center">

<div class="logo-eye">
<div class="eye">
<div class="pupil"></div>
</div>
</div>

<div class="brand-name">Einblick</div>
<div class="slogan">Where Knowledge Becomes Insight</div>

</div>

<!-- ZONE 2 -->

<div class="zone">

<div class="widget-row">

<div class="widget">

<div class="clock">
<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
</div>

<div class="digital" id="digital"></div>

</div>

<div class="widget">

<div class="calendar-day" id="day"></div>
<div class="calendar-date" id="date"></div>

</div>

<div class="widget">
Loading news...
</div>

<div class="widget">
☀️ 26°C
</div>

</div>

</div>

<!-- ZONE 3 -->

<div class="zone">

<div class="search-panel">

<div class="attach">📎</div>

<input class="search-input" placeholder="Search Einblick">

<button class="search-btn">Search</button>

</div>

</div>

<!-- ZONE 4 -->

<div class="zone">

<div class="reflection">

<div class="reflection-title">Today's Reflection</div>

<div class="quote">
“The universe is not only stranger than we imagine,
it is stranger than we can imagine.”
</div>

<div class="author">— J. B. S. Haldane</div>

</div>

</div>

<!-- ZONE 5 -->

<div class="zone">

<div class="panel-row">

<div class="panel"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg></div>
<div class="panel"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg></div>
<div class="panel"><svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg></div>
<div class="panel"><svg viewBox="0 0 24 24"><polygon points="12,4 20,20 4,20"/></svg></div>
<div class="panel"><svg viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"/></svg></div>
<div class="panel"><svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/></svg></div>
<div class="panel"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg></div>
<div class="panel"><svg viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10"/></svg></div>

</div>

</div>

<!-- ZONE 6 -->

<div class="footer">
Created by Dr. Aishvarya Adhaulia
</div>

</div>

<script>

/* CLOCK */

function updateClock(){

const now=new Date()

const sec=now.getSeconds()
const min=now.getMinutes()
const hr=now.getHours()

document.getElementById("second").style.transform=`translateX(-50%) rotate(${sec*6}deg)`
document.getElementById("minute").style.transform=`translateX(-50%) rotate(${min*6}deg)`
document.getElementById("hour").style.transform=`translateX(-50%) rotate(${hr*30+min/2}deg)`

document.getElementById("digital").textContent=now.toLocaleTimeString()

}

setInterval(updateClock,1000)
updateClock()

/* CALENDAR */

const today=new Date()

document.getElementById("day").textContent=today.toLocaleDateString(undefined,{weekday:'long'})
document.getElementById("date").textContent=today.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})

</script>

</body>
</html>
