<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Einblick</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
background: radial-gradient(circle at top, #0f1d3a 0%, #05070d 60%, #000000 100%);
color:#e8e8e8;
display:flex;
justify-content:center;
}

.container{
width:95%;
max-width:1200px;
padding:40px 0;
text-align:center;
}

/* BRAND */

.logo{
width:80px;
height:80px;
border:3px solid #cfd3dc;
border-radius:50%;
margin:0 auto 10px auto;
display:flex;
align-items:center;
justify-content:center;
}

.logo::after{
content:"";
width:16px;
height:16px;
background:#cfd3dc;
border-radius:50%;
}

.brand-name{
font-size:34px;
font-weight:600;
margin-top:10px;
}

.slogan{
color:#9aa0aa;
margin-top:6px;
}

/* WIDGETS */

.widget-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin:40px 0;
}

.widget{
background:#14161c;
border:1px solid #23252d;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
border-radius:10px;
}

/* SEARCH */

.search-panel{
display:flex;
margin:25px 0;
background:#14161c;
border:1px solid #23252d;
border-radius:10px;
overflow:hidden;
}

.attach{
width:60px;
display:flex;
align-items:center;
justify-content:center;
border-right:1px solid #23252d;
cursor:pointer;
}

.search-input{
flex:1;
background:transparent;
border:none;
color:white;
padding:14px;
font-size:16px;
}

.search-input:focus{
outline:none;
}

.search-btn{
width:110px;
background:#1c1f28;
border:none;
color:white;
cursor:pointer;
}

/* REFLECTION */

.reflection{
margin:30px 0;
background:#14161c;
border:1px solid #23252d;
border-radius:10px;
padding:25px;
}

.reflection-title{
color:#9aa0aa;
margin-bottom:10px;
}

.quote{
font-size:18px;
margin-bottom:10px;
}

.author{
color:#9aa0aa;
}

/* PANELS */

.panel-row{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:15px;
margin-top:30px;
}

.panel{
background:#14161c;
border:1px solid #23252d;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
border-radius:10px;
}

/* FOOTER */

.footer{
margin-top:35px;
color:#888;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGO -->

<div class="logo"></div>

<div class="brand-name">Einblick</div>

<div class="slogan">Where Knowledge Becomes Insight</div>

<!-- WIDGETS -->

<div class="widget-row">

<div class="widget">
<div id="clock"></div>
</div>

<div class="widget">
<div id="calendar"></div>
</div>

<div class="widget">
Loading news...
</div>

<div class="widget">
☀️ 26°C
</div>

</div>

<!-- SEARCH -->

<div class="search-panel">

<div class="attach">📎</div>

<input class="search-input" placeholder="Search">

<button class="search-btn">Search</button>

</div>

<!-- REFLECTION -->

<div class="reflection">

<div class="reflection-title">Today's Reflection</div>

<div class="quote">
“The universe is not only stranger than we imagine,
it is stranger than we can imagine.”
</div>

<div class="author">— J. B. S. Haldane</div>

</div>

<!-- PANELS -->

<div class="panel-row">

<div class="panel">○</div>
<div class="panel">□</div>
<div class="panel">\</div>
<div class="panel">△</div>
<div class="panel">—</div>
<div class="panel">/</div>
<div class="panel">•</div>
<div class="panel">□</div>

</div>

<!-- FOOTER -->

<div class="footer">
Created by Dr. Aishvarya Adhaulia
</div>

</div>

<script>

/* CLOCK */

function updateClock(){
const now=new Date();
document.getElementById("clock").textContent=
now.toLocaleTimeString();
}

setInterval(updateClock,1000);
updateClock();

/* CALENDAR */

const today=new Date();
document.getElementById("calendar").textContent=
today.toDateString();

</script>

</body>
</html>
