<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EINBLICK</title>

<style>

body{
margin:0;
font-family:"Neue Einstellung",sans-serif;
color:#EAEAEA;
background:#0B0B0C;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* background */

.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background-image:
radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
background-size:80px 80px,140px 140px;
animation:spaceDrift 60s linear infinite;
opacity:.25;
}

@keyframes spaceDrift{
0%{transform:translate(0,0)}
100%{transform:translate(-120px,-80px)}
}

/* stage */

.stage{
display:flex;
flex-direction:column;
align-items:center;
gap:48px;
width:100%;
max-width:480px;
}

/* eye */

.eye{
width:160px;
height:100px;
display:flex;
align-items:center;
justify-content:center;
animation:blink 7s infinite;
margin-bottom:-10px;
}

@keyframes blink{
0%,92%,100%{transform:scaleY(1)}
95%{transform:scaleY(.08)}
}

#pupil{
transition:.35s ease;
}

/* title */

h1{
margin:0;
letter-spacing:.18em;
font-weight:500;
position:relative;
left:2px;
}

/* generator */

.generator{
display:flex;
flex-direction:column;
align-items:center;
gap:26px;
width:100%;
}

input{
width:100%;
background:transparent;
border:none;
border-bottom:1.5px solid #444;
padding:14px 0;
font-size:16px;
color:#EAEAEA;
text-align:center;
}

input:focus{
outline:none;
border-bottom:1.5px solid white;
}

button{
width:100%;
padding:13px;
border-radius:2px;
border:1px solid rgba(255,255,255,.25);
background:linear-gradient(
to bottom,
rgba(255,255,255,.12),
rgba(255,255,255,.06)
);
color:#EAEAEA;
font-weight:600;
letter-spacing:.06em;
cursor:pointer;
}

/* creator */

footer{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:480px;
max-width:90vw;
display:flex;
justify-content:center;
font-size:14px;
opacity:.6;
}

/* Insight Card */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
backdrop-filter:blur(6px);
z-index:10;
}

.insight-card{
background:#F4F1E8;
color:#111;
margin:8% auto;
padding:40px;
width:90%;
max-width:520px;
border:1px solid #222;
box-shadow:0 0 30px rgba(0,0,0,.6);
font-family:Georgia,serif;
}

.card-title{
text-align:center;
font-size:28px;
letter-spacing:.08em;
margin-bottom:30px;
}

.diagram-area{
height:140px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:25px;
}

.card-section{
margin-bottom:14px;
}

.card-button{
margin-top:24px;
}

.card-button button{
background:#111;
color:#F4F1E8;
border:none;
}

.close{
float:right;
font-size:22px;
cursor:pointer;
}

/* Creator modal */

.modal-content{
background:#111;
margin:12% auto;
padding:40px;
border-radius:10px;
width:90%;
max-width:600px;
color:white;
}

</style>
</head>

<body>

<div class="space"></div>

<div class="stage">

<div class="eye">

<svg width="160" height="100" viewBox="0 0 140 90">

<ellipse cx="70" cy="45" rx="55" ry="25"
stroke="white" stroke-width="2.6" fill="none"/>

<circle cx="70" cy="45" r="8"
fill="white" id="pupil"/>

</svg>

</div>

<h1>EINBLICK</h1>

<div class="generator">

<input id="topic" placeholder="Subject">

<button onclick="startResearch()">Research</button>

</div>

</div>

<footer>
<span onclick="openCreator()">Creator</span>
</footer>

<!-- Insight Card -->

<div id="resultModal" class="modal">

<div class="insight-card">

<span class="close" onclick="closeResult()">×</span>

<div class="card-title" id="cardTitle"></div>

<div class="diagram-area" id="diagramArea"></div>

<div class="card-section"><strong>Definition</strong><span id="definition"></span></div>
<div class="card-section"><strong>Principle</strong><span id="principle"></span></div>
<div class="card-section"><strong>History</strong><span id="history"></span></div>
<div class="card-section"><strong>Application</strong><span id="application"></span></div>
<div class="card-section"><strong>Interesting Fact</strong><span id="fact"></span></div>

<div class="card-button">
<button onclick="openBooklet()">Open Booklet</button>
</div>

</div>

</div>

<!-- Creator -->

<div id="creatorModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeCreator()">×</span>

<h2>Creator</h2>
<p>Dr. Aishvarya Adhaulia</p>

</div>
</div>

<script>

/* DIAGRAM ENGINE */

function generateDiagram(topic){

topic = topic.toLowerCase()

if(topic.includes("quantum")){

return `<svg width="220" height="80">
<circle cx="40" cy="40" r="6" fill="black"/>
<circle cx="180" cy="40" r="6" fill="black"/>
<line x1="46" y1="40" x2="174" y2="40"
stroke="black" stroke-width="2"/>
</svg>`

}

if(topic.includes("black hole") || topic.includes("galaxy")){

return `<svg width="200" height="120">
<ellipse cx="100" cy="60" rx="60" ry="20"
fill="none" stroke="black"/>
<circle cx="100" cy="60" r="8" fill="black"/>
</svg>`

}

if(topic.includes("car") || topic.includes("ferrari") || topic.includes("porsche")){

return `<svg width="220" height="80">
<rect x="40" y="40" width="120" height="20"
fill="none" stroke="black"/>
<circle cx="70" cy="65" r="8" fill="black"/>
<circle cx="150" cy="65" r="8" fill="black"/>
</svg>`

}

if(topic.includes("ai") || topic.includes("android")){

return `<svg width="180" height="120">
<rect x="50" y="30" width="80" height="50"
fill="none" stroke="black"/>
<line x1="90" y1="80" x2="90" y2="110"
stroke="black"/>
</svg>`

}

/* default */

return `<svg width="200" height="120">
<circle cx="100" cy="40" r="8" fill="black"/>
<circle cx="60" cy="80" r="6" fill="black"/>
<circle cx="140" cy="80" r="6" fill="black"/>
<line x1="100" y1="48" x2="60" y2="74"
stroke="black"/>
<line x1="100" y1="48" x2="140" y2="74"
stroke="black"/>
</svg>`

}

/* KNOWLEDGE ENGINE */

function generateKnowledge(topic){

return{

title:topic,

definition:
topic+" is a subject of study with important scientific or cultural significance.",

principle:
"The core principle of "+topic+" involves understanding its fundamental mechanisms.",

history:
"The study of "+topic+" evolved through decades of discovery.",

application:
topic+" has practical applications in science, technology and society.",

fact:
"One fascinating aspect of "+topic+" is how it connects multiple domains of knowledge."

}

}

/* RESEARCH ENGINE */

let currentBooklet=""

function startResearch(){

let topic=document.getElementById("topic").value

if(topic==="") topic="Subject"

let data=generateKnowledge(topic)

document.getElementById("cardTitle").innerText=data.title

document.getElementById("definition").innerText=data.definition
document.getElementById("principle").innerText=data.principle
document.getElementById("history").innerText=data.history
document.getElementById("application").innerText=data.application
document.getElementById("fact").innerText=data.fact

document.getElementById("diagramArea").innerHTML =
generateDiagram(topic)

currentBooklet=generateBooklet(data,topic)

document.getElementById("resultModal").style.display="block"

}

/* BOOKLET */

function generateBooklet(data,topic){

let diagram = generateDiagram(topic)

let html="<html><body style='font-family:Georgia;background:#111;color:white;padding:40px'>"

html += "<h1>"+data.title+"</h1>"+diagram

html += "<h2>Definition</h2><p>"+data.definition+"</p>"
html += "<h2>Principle</h2><p>"+data.principle+"</p>"
html += "<h2>History</h2><p>"+data.history+"</p>"
html += "<h2>Applications</h2><p>"+data.application+"</p>"
html += "<h2>Interesting Fact</h2><p>"+data.fact+"</p>"

html += "</body></html>"

return html

}

function openBooklet(){

let win=window.open()

win.document.write(currentBooklet)

}

/* modals */

function closeResult(){
document.getElementById("resultModal").style.display="none"
}

function openCreator(){
document.getElementById("creatorModal").style.display="block"
}

function closeCreator(){
document.getElementById("creatorModal").style.display="none"
}

</script>

</body>
</html>
