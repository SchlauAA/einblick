<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Einblick</title>

<link href="https://fonts.cdnfonts.com/css/neue-einstellung" rel="stylesheet">

<style>

/* GLOBAL */

body{

font-family:"Neue Einstellung",-apple-system,sans-serif;

margin:0;

background:linear-gradient(140deg,#0a0f16,#121a24,#0a0f16);
background-size:200% 200%;
animation:bgmove 30s infinite;

color:white;

overflow:auto;

}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SCROLLBARS */

::-webkit-scrollbar{
width:10px;
height:10px;
}

::-webkit-scrollbar-thumb{
background:#374151;
border-radius:6px;
}

/* MAIN */

.main{

padding:40px;

min-width:1500px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(4,320px);

gap:24px;

justify-content:center;

margin-bottom:30px;

}

/* WIDGET */

.widget{

width:320px;
height:198px;

background:#111827;

border-radius:14px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

position:relative;

}

.widget:hover::after{

content:attr(title);

position:absolute;

bottom:10px;

background:black;

padding:4px 8px;

font-size:12px;

border-radius:4px;

}

/* PANEL */

.panel{

width:320px;
height:198px;

background:#111827;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

position:relative;

transition:.25s;

}

.panel:hover{

background:#1f2937;
transform:scale(1.02);

}

.panel:hover::after{

content:attr(title);

position:absolute;

bottom:10px;

background:black;

padding:4px 8px;

font-size:12px;

border-radius:4px;

}

/* ICONS */

.icon{

width:48px;
height:48px;

stroke:white;
fill:none;
stroke-width:2;

}

/* SEARCH */

.search{

width:900px;

margin:40px auto;

display:flex;

background:#1f2937;

border-radius:16px;

overflow:hidden;

}

.search input{

flex:1;

border:none;

padding:18px;

background:transparent;

color:white;

font-size:16px;

}

.search button{

border:none;

background:#374151;

padding:0 22px;

color:white;

cursor:pointer;

}

/* PURSUITS */

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="main">

<!-- OBSERVATION WIDGETS -->

<div class="grid">

<div class="widget" title="Chronometer">
<canvas id="clock" width="120" height="120"></canvas>
</div>

<div class="widget" title="Calendar">
<div id="date"></div>
</div>

<div class="widget" title="News">
<div id="news">Loading news...</div>
</div>

<div class="widget" title="Weather">
<div id="weather">Loading weather...</div>
</div>

</div>

<!-- SEARCH -->

<div class="search">

<button>+</button>

<input placeholder="Ask Ein anything">

<button id="searchBtn">Search</button>

</div>

<!-- PANELS -->

<div class="grid">

<div class="panel" title="Insight">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="8"/>
<line x1="12" y1="8" x2="12" y2="12"/>
<circle cx="12" cy="16" r="1"/>
</svg>

</div>

<div class="panel" title="Research">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="10" cy="10" r="6"/>
<line x1="14" y1="14" x2="20" y2="20"/>
</svg>

</div>

<div class="panel" title="Learning">

<svg class="icon" viewBox="0 0 24 24">
<path d="M4 6l8-4 8 4-8 4z"/>
<path d="M4 10l8 4 8-4"/>
</svg>

</div>

<div class="panel" title="Instruments">

<svg class="icon" viewBox="0 0 24 24">
<path d="M3 7h18M6 7v10M18 7v10"/>
</svg>

</div>

<div class="panel" title="Health">

<svg class="icon" viewBox="0 0 24 24">
<path d="M12 21s-6-4.5-9-8a5 5 0 019-4 5 5 0 019 4c-3 3.5-9 8-9 8z"/>
</svg>

</div>

<div class="panel" title="Pursuits" onclick="togglePursuits()">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<line x1="12" y1="12" x2="17" y2="7"/>
</svg>

</div>

<div class="panel" title="Preferences">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M19 12a7 7 0 00-.1-1l2-1.5-2-3.5-2.3.5a7 7 0 00-1.7-1L14 2h-4l-.9 2.5a7 7 0 00-1.7 1L5 5l-2 3.5 2 1.5a7 7 0 000 2L3 13.5 5 17l2.3-.5a7 7 0 001.7 1L10 22h4l.9-2.5a7 7 0 001.7-1L19 19l2-3.5-2-1.5c.1-.3.1-.7.1-1z"/>
</svg>

</div>

<div class="panel" title="System">

<svg class="icon" viewBox="0 0 24 24">
<rect x="3" y="4" width="18" height="12"/>
<line x1="8" y1="20" x2="16" y2="20"/>
</svg>

</div>

</div>

<!-- PURSUITS MENU -->

<div id="pursuitsMenu" class="hidden">

<h3>Reading Room</h3>

Books<br>
Reading Lists<br>
Saved Articles

<h3>Gaming Room</h3>

Chess<br>
Tic Tac Toe<br>
Snake<br>

<div onclick="toggleSolitaire()">Solitaire</div>

<div id="solitaireList" class="hidden">

Spider Solitaire<br>
Solitaire Foundations<br>
Clock Solitaire

</div>

</div>

</div>

<script>

/* CLOCK */

function drawClock(){

let canvas=document.getElementById("clock")

let ctx=canvas.getContext("2d")

let r=canvas.height/2

ctx.translate(r,r)

setInterval(function(){

ctx.clearRect(-r,-r,canvas.width,canvas.height)

let now=new Date()

let sec=now.getSeconds()

let angle=sec*Math.PI/30

ctx.beginPath()

ctx.moveTo(0,0)

ctx.lineTo(r*Math.sin(angle),-r*Math.cos(angle))

ctx.strokeStyle="white"

ctx.stroke()

},1000)

}

drawClock()

/* DATE */

document.getElementById("date").innerText=
new Date().toDateString()

/* PURSUITS */

function togglePursuits(){

let m=document.getElementById("pursuitsMenu")

m.classList.toggle("hidden")

}

function toggleSolitaire(){

let s=document.getElementById("solitaireList")

s.classList.toggle("hidden")

}

</script>

</body>

</html>
