<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einblick</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
background:#000;
color:#e8e8e8;
display:flex;
justify-content:center;
line-height:1.5;
overflow-x:hidden;
}

/* animated grid */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
background-size:60px 60px;
animation:gridMove 60s linear infinite;
z-index:-1;
}

@keyframes gridMove{
0%{transform:translate(0,0)}
100%{transform:translate(60px,60px)}
}

/* container */

.container{
width:92%;
max-width:1200px;
margin:auto;
display:flex;
flex-direction:column;
gap:56px;
padding:70px 40px;
border:1px solid rgba(255,255,255,0.06);
border-radius:18px;
background:rgba(10,10,10,0.9);
}

/* eye */

.logo-eye{
display:flex;
justify-content:center;
margin-bottom:16px;
}

.eye{
width:82px;
height:52px;
border:2px solid #cfd3dc;
border-radius:50px/30px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

.pupil{
width:14px;
height:14px;
background:#cfd3dc;
border-radius:50%;
position:absolute;
transition:.2s;
}

.eyelid{
position:absolute;
width:100%;
height:100%;
background:#000;
top:-100%;
}

@keyframes blink{
0%{top:-100%}
50%{top:0}
100%{top:-100%}
}

.blink{animation:blink .5s ease}

/* widgets */

.widget-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

.widget{
aspect-ratio:1/1;
background:#0d0d0d;
border:1px solid #242424;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:.25s;
}

.widget:hover{
transform:scale(1.04);
border-color:#fff;
}

/* clock */

.clock{
width:70px;
height:70px;
border:2px solid #cfd3dc;
border-radius:50%;
position:relative;
margin-bottom:10px;
}

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
background:#cfd3dc;
}

.hour{width:3px;height:20px}
.minute{width:2px;height:28px}
.second{width:1px;height:32px}

/* search */

.search-panel{
display:flex;
background:#0d0d0d;
border:1px solid #242424;
border-radius:12px;
overflow:hidden;
}

.attach{
width:60px;
display:flex;
align-items:center;
justify-content:center;
}

.search-input{
flex:1;
background:transparent;
border:none;
color:white;
padding:16px;
font-size:16px;
}

.search-btn{
width:120px;
background:#141414;
border:none;
color:white;
cursor:pointer;
}

/* workspace */

.workspace{
background:#0d0d0d;
border:1px solid #242424;
border-radius:12px;
padding:24px;
transition:.4s;
}

.workspace.fade{
opacity:0;
}

.workspace h2{
margin-bottom:10px;
}

.section{
margin-top:18px;
}

.section-title{
color:#9aa0aa;
margin-bottom:6px;
font-size:14px;
}

/* panels */

.panel-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

.panel{
aspect-ratio:1/1;
background:#0d0d0d;
border:1px solid #242424;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s;
}

.panel svg{
width:42px;
height:42px;
stroke:#d2d6e0;
stroke-width:1.6;
fill:none;
margin-bottom:6px;
}

.panel:hover{
transform:translateY(-4px) scale(1.05);
border-color:#fff;
}

/* reflection */

.reflection{
background:#0d0d0d;
border:1px solid #242424;
border-radius:12px;
padding:28px;
text-align:center;
font-style:italic;
}

.footer{
text-align:center;
color:#888;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-eye">
<div class="eye" id="eye">
<div class="pupil" id="pupil"></div>
<div class="eyelid" id="eyelid"></div>
</div>
</div>

<h1 style="text-align:center;">Einblick</h1>

<!-- widgets -->

<div class="widget-row">

<div class="widget">
<div class="clock">
<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
</div>
<div id="digital"></div>
</div>

<div class="widget" id="calendar"></div>

<div class="widget">News</div>

<div class="widget">Weather</div>

</div>

<!-- search -->

<div class="search-panel">
<div class="attach">📎</div>
<input id="searchInput" class="search-input" placeholder="Search Einblick">
<button class="search-btn" onclick="runSearch()">Search</button>
</div>

<!-- workspace -->

<div class="workspace" id="workspace">

<h2>Workspace</h2>

<div class="section">
<div class="section-title">Status</div>
Ready for research.
</div>

</div>

<!-- panels -->

<div class="panel-grid">

<div class="panel">Knowledge</div>
<div class="panel">Discovery</div>
<div class="panel">Life</div>
<div class="panel">Control</div>

</div>

<div class="reflection">
"If space-time bends under gravity, what might a universe without mass look like?"
</div>

<div class="footer">
Created by Dr. Aishvarya Adhaulia
</div>

</div>

<script>

/* research engine */

function runSearch(){

const input=document.getElementById("searchInput").value.trim()

if(!input)return

const workspace=document.getElementById("workspace")

workspace.classList.add("fade")

setTimeout(()=>{

workspace.innerHTML=`

<h2>Topic: ${input}</h2>

<div class="section">
<div class="section-title">Insight</div>
${input} is a topic currently being explored within the Einblick research workspace. Further analysis and knowledge connections can be generated as the system evolves.
</div>

<div class="section">
<div class="section-title">Key Facts</div>
• foundational concept<br>
• subject of ongoing research<br>
• connected to multiple knowledge domains
</div>

<div class="section">
<div class="section-title">Related Concepts</div>
Knowledge Graph<br>
Scientific Models<br>
Historical Development
</div>

<div class="section">
<div class="section-title">Suggested Instruments</div>
Research Explorer<br>
Analytical Calculator<br>
Knowledge Graph Viewer
</div>

`

workspace.classList.remove("fade")

},300)

}

/* clock */

function updateClock(){

const now=new Date()

const sec=now.getSeconds()
const min=now.getMinutes()
const hr=now.getHours()

document.getElementById("second").style.transform=
`translateX(-50%) rotate(${sec*6}deg)`

document.getElementById("minute").style.transform=
`translateX(-50%) rotate(${min*6}deg)`

document.getElementById("hour").style.transform=
`translateX(-50%) rotate(${hr*30+min/2}deg)`

document.getElementById("digital").textContent=
now.toLocaleTimeString()

}

setInterval(updateClock,1000)

updateClock()

/* calendar */

const today=new Date()

document.getElementById("calendar").innerHTML=
today.toLocaleDateString(undefined,{
weekday:'long',
day:'numeric',
month:'short',
year:'numeric'
})

/* eye */

const pupil=document.getElementById("pupil")
const eye=document.getElementById("eye")

document.addEventListener("mousemove",e=>{

const rect=eye.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const centerX=rect.width/2
const centerY=rect.height/2

const moveX=(x-centerX)/10
const moveY=(y-centerY)/10

pupil.style.transform=`translate(${moveX}px,${moveY}px)`

})

setInterval(()=>{

document.getElementById("eyelid").classList.add("blink")

setTimeout(()=>{

document.getElementById("eyelid").classList.remove("blink")

},400)

},4000)

</script>

</body>
</html>
