<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Einblick</title>

<style>

body{
background:#0b0f14;
color:white;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
text-align:center;
margin:0;
padding:20px;
}

/* TITLE */

h1{
letter-spacing:3px;
font-weight:600;
}

/* EYE */

.eye-container{
display:flex;
justify-content:center;
margin-top:25px;
margin-bottom:25px;
}

.eye{
width:100px;
height:60px;
background:#e6e6e6;
border-radius:50%/60%;
position:relative;
box-shadow:0 0 12px rgba(0,0,0,0.6) inset;
animation:blink 8s infinite;
}

.pupil{
width:26px;
height:26px;
background:#1a1a1a;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:all 0.25s;
}

.eye.thinking{
box-shadow:0 0 20px rgba(255,255,255,0.6);
}

@keyframes blink{

0%{transform:scaleY(1)}
95%{transform:scaleY(1)}
98%{transform:scaleY(0.05)}
100%{transform:scaleY(1)}

}

/* CARDS */

.card{
background:#151a21;
padding:22px;
margin:22px;
border-radius:18px;
box-shadow:0 10px 20px rgba(0,0,0,0.35);
transition:transform 0.2s;
}

.card:active{
transform:scale(1.03);
}

/* CLOCK */

.clock{
font-size:34px;
margin-top:10px;
font-weight:500;
}

/* SEARCH */

input{
width:85%;
padding:14px;
font-size:16px;
border-radius:12px;
border:none;
background:#1e2530;
color:white;
outline:none;
}

/* SECTIONS */

.section{
margin-top:25px;
opacity:0.7;
font-size:18px;
}

/* BUTTONS */

button{

padding:14px 18px;
margin:10px;
font-size:15px;
border-radius:14px;
border:none;
background:#d8d8d8;
color:black;
font-weight:500;
transition:transform 0.15s;

}

button:active{
transform:scale(0.92);
}

/* BREATHING CIRCLE */

.breath-circle{

width:80px;
height:80px;
border-radius:50%;
background:#444;
margin:auto;
animation:breathe 6s infinite;

}

@keyframes breathe{

0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}

}

/* INSIGHT */

#insightCard{
display:none;
}

.focus-hidden{
display:none;
}

</style>

</head>

<body>

<h1>EINBLICK</h1>

<div class="eye-container">

<div class="eye" id="eye">
<div class="pupil" id="pupil"></div>
</div>

</div>

<div class="card">

<h2>Chronometer</h2>

<div id="clock" class="clock"></div>

</div>

<div class="card">

<input id="query" placeholder="Ask Ein..." onkeydown="if(event.key==='Enter'){searchInsight()}">

</div>

<div class="card" id="insightCard">

<h2>Insight</h2>

<p id="insightText"></p>

</div>

<div class="section" id="instrumentLabel">

Instruments

</div>

<div class="card" id="instruments">

<button>Calculator</button>
<button>Dictionary</button>
<button>Currency</button>

</div>

<div class="section" id="wellnessLabel">

Wellness

</div>

<div class="card" id="wellness">

<div class="breath-circle"></div>

<p>Breathing Guide</p>

</div>

<div class="card">

<button onclick="toggleFocus()">Focus Mode</button>

</div>

<script>

/* CLOCK */

function updateClock(){

let now=new Date()

document.getElementById("clock").innerHTML=
now.toLocaleTimeString()

}

setInterval(updateClock,1000)

updateClock()

/* EYE FOLLOW TOUCH */

let pupil=document.getElementById("pupil")

document.addEventListener("touchstart",function(e){

let x=(e.touches[0].clientX/window.innerWidth-0.5)*20
let y=(e.touches[0].clientY/window.innerHeight-0.5)*20

pupil.style.transform=
"translate(-50%,-50%) translate("+x+"px,"+y+"px)"

})

/* SEARCH INSIGHT */

async function searchInsight(){

let query=document.getElementById("query").value

let eye=document.getElementById("eye")

eye.classList.add("thinking")

try{

let response=await fetch(
"https://en.wikipedia.org/api/rest_v1/page/summary/"+query
)

let data=await response.json()

document.getElementById("insightText").innerText=
data.extract || "No insight found."

document.getElementById("insightCard").style.display="block"

}catch{

document.getElementById("insightText").innerText=
"Unable to retrieve information."

document.getElementById("insightCard").style.display="block"

}

eye.classList.remove("thinking")

}

/* FOCUS MODE */

function toggleFocus(){

let instruments=document.getElementById("instruments")
let wellness=document.getElementById("wellness")
let instrumentLabel=document.getElementById("instrumentLabel")
let wellnessLabel=document.getElementById("wellnessLabel")

instruments.classList.toggle("focus-hidden")
wellness.classList.toggle("focus-hidden")
instrumentLabel.classList.toggle("focus-hidden")
wellnessLabel.classList.toggle("focus-hidden")

}

</script>

</body>

</html>
