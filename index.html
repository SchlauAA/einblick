<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Einblick</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
background:radial-gradient(circle at top,#0f1d3a 0%,#05070d 60%,#000 100%);
color:#e8e8e8;
display:flex;
justify-content:center;
}

.container{
width:90%;
max-width:1100px;
padding:60px 0;
}

/* ZONES */

.zone{
width:100%;
margin-bottom:48px;
text-align:center;
}

/* EYE LOGO */

.logo-eye{
display:flex;
justify-content:center;
margin-bottom:18px;
}

.eye{
width:80px;
height:50px;
border:2px solid #cfd3dc;
border-radius:50px/30px;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.pupil{
width:14px;
height:14px;
background:#cfd3dc;
border-radius:50%;
position:absolute;
box-shadow:0 0 8px rgba(140,160,255,.6);
transition:transform .15s;
}

.eyelid{
position:absolute;
width:100%;
height:100%;
background:#05070d;
top:-100%;
}

@keyframes blink{
0%{top:-100%;}
45%{top:-100%;}
50%{top:0;}
55%{top:-100%;}
100%{top:-100%;}
}

.blink{
animation:blink .5s ease;
}

/* BRAND */

.brand-name{
font-size:36px;
font-weight:600;
margin-bottom:6px;
}

.slogan{
color:#9aa0aa;
}

/* WIDGET GRID */

.widget-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
margin-top:48px;
}

.widget{
background:#14161c;
border:1px solid #23252d;
aspect-ratio:1/1;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
transition:.22s;
}

.widget:hover{
transform:scale(1.04);
border-color:#5b7cff;
box-shadow:0 0 8px rgba(120,140,255,.25);
}

/* CLOCK */

.clock{
width:70px;
height:70px;
border:2px solid #cfd3dc;
border-radius:50%;
position:relative;
margin-bottom:10px;
}

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
background:#cfd3dc;
}

.hour{width:3px;height:20px;}
.minute{width:2px;height:28px;}
.second{width:1px;height:32px;background:#8aa4ff;}

.digital{font-size:14px}

/* CALENDAR */

.calendar-day{
font-size:18px;
font-weight:500;
}

.calendar-date{
font-size:14px;
color:#9aa0aa;
}

/* SEARCH */

.search-panel{
display:flex;
background:#14161c;
border:1px solid #23252d;
border-radius:12px;
overflow:hidden;
}

.attach{
width:60px;
display:flex;
align-items:center;
justify-content:center;
border-right:1px solid #23252d;
cursor:pointer;
transition:.22s;
}

.attach:hover{
background:#1d2028;
}

.search-input{
flex:1;
background:transparent;
border:none;
color:white;
padding:16px;
font-size:16px;
}

.search-input:focus{
outline:none;
background:#11141a;
}

.search-btn{
width:120px;
background:#1c1f28;
border:none;
color:white;
cursor:pointer;
transition:.22s;
}

.search-btn:hover{
background:#2a2f3c;
}

/* REFLECTION */

.reflection{
background:#14161c;
border:1px solid #23252d;
border-radius:12px;
padding:28px;
}

.reflection-title{
color:#9aa0aa;
margin-bottom:12px;
}

.quote{
font-size:18px;
margin-bottom:10px;
}

.author{
color:#9aa0aa;
}

/* PANEL GRID */

.panel-row{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:18px;
}

.panel{
background:#14161c;
border:1px solid #23252d;
aspect-ratio:1/1;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
transition:.22s;
}

.panel svg{
width:26px;
height:26px;
stroke:#cfd3dc;
stroke-width:1.8;
fill:none;
}

.panel:hover{
transform:scale(1.04);
border-color:#5b7cff;
box-shadow:0 0 8px rgba(120,140,255,.25);
}

.panel:hover svg{
stroke:#8aa4ff;
}

/* FOOTER */

.footer{
text-align:center;
color:#888;
font-size:14px;
margin-top:36px;
}

</style>
</head>

<body>

<div class="container">

<!-- ZONE 1 -->

<div class="zone">

<div class="logo-eye">

<div class="eye" id="eye">

<div class="pupil" id="pupil"></div>
<div class="eyelid" id="eyelid"></div>

</div>

</div>

<div class="brand-name">Einblick</div>

<div class="slogan">Where Knowledge Becomes Insight</div>

</div>

<!-- ZONE 2 -->

<div class="zone">

<div class="widget-row">

<div class="widget">

<div class="clock">

<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>

</div>

<div class="digital" id="digital"></div>

</div>

<div class="widget">

<div class="calendar-day" id="day"></div>
<div class="calendar-date" id="date"></div>

</div>

<div class="widget">
Loading news...
</div>

<div class="widget">
☀️ 26°C
</div>

</div>

</div>

<!-- ZONE 3 -->

<div class="zone">

<div class="search-panel">

<div class="attach">📎</div>

<input class="search-input" id="searchInput" placeholder="Search Einblick">

<button class="search-btn" id="searchBtn">Search</button>

</div>

</div>

<!-- ZONE 4 -->

<div class="zone">

<div class="reflection">

<div class="reflection-title">Today's Reflection</div>

<div class="quote">
“The universe is not only stranger than we imagine,
it is stranger than we can imagine.”
</div>

<div class="author">— J. B. S. Haldane</div>

</div>

</div>

<!-- ZONE 5 -->

<div class="zone">

<div class="panel-row">

<div class="panel"><svg viewBox="0 0 24 24"><path d="M9 18h6M10 14h4M12 2a7 7 0 00-4 12c1 1 1 2 1 3h6c0-1 0-2 1-3a7 7 0 00-4-12z"/></svg></div>

<div class="panel"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM4 8h16"/></svg></div>

<div class="panel"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg></div>

<div class="panel"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v9l6 3"/></svg></div>

<div class="panel"><svg viewBox="0 0 24 24"><path d="M12 21s-6-4.5-6-10a6 6 0 1112 0c0 5.5-6 10-6 10z"/></svg></div>

<div class="panel"><svg viewBox="0 0 24 24"><path d="M3 20l6-16 6 16 6-16"/></svg></div>

<div class="panel"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></div>

<div class="panel"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/><rect x="9" y="9" width="6" height="6"/></svg></div>

</div>

</div>

<!-- ZONE 6 -->

<div class="footer">

Created by Dr. Aishvarya Adhaulia

</div>

</div>

<script>

/* CLOCK */

function updateClock(){

const now=new Date()

const sec=now.getSeconds()
const min=now.getMinutes()
const hr=now.getHours()

document.getElementById("second").style.transform=`translateX(-50%) rotate(${sec*6}deg)`
document.getElementById("minute").style.transform=`translateX(-50%) rotate(${min*6}deg)`
document.getElementById("hour").style.transform=`translateX(-50%) rotate(${hr*30+min/2}deg)`

document.getElementById("digital").textContent=now.toLocaleTimeString()

}

setInterval(updateClock,1000)
updateClock()

/* CALENDAR */

const today=new Date()

document.getElementById("day").textContent=today.toLocaleDateString(undefined,{weekday:'long'})
document.getElementById("date").textContent=today.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})

/* EYE CURSOR TRACK */

const eye=document.getElementById("eye")
const pupil=document.getElementById("pupil")

document.addEventListener("mousemove",e=>{

const rect=eye.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const centerX=rect.width/2
const centerY=rect.height/2

const moveX=(x-centerX)/10
const moveY=(y-centerY)/10

pupil.style.transform=`translate(${moveX}px,${moveY}px)`

})

/* BLINK */

const eyelid=document.getElementById("eyelid")

setInterval(()=>{

eyelid.classList.add("blink")

setTimeout(()=>{
eyelid.classList.remove("blink")
},500)

},4000)

/* SEARCH FOCUS */

const searchInput=document.getElementById("searchInput")

searchInput.addEventListener("focus",()=>{
pupil.style.transform="scale(1.4)"
})

searchInput.addEventListener("blur",()=>{
pupil.style.transform="scale(1)"
})

</script>

</body>
</html>
