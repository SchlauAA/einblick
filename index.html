<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Einblick</title>

<link href="https://fonts.cdnfonts.com/css/neue-einstellung" rel="stylesheet">

<style>

/* BODY */

body{

font-family:"Neue Einstellung",-apple-system,sans-serif;

margin:0;

background:linear-gradient(140deg,#0a0f16,#121a24,#0a0f16);
background-size:200% 200%;
animation:bgmove 30s infinite;

color:white;

overflow:auto;

}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* MAIN */

.main{

padding:60px;

min-width:1500px;

text-align:center;

}

/* AI EYE */

.eyeContainer{

margin-bottom:50px;

}

.eye{

width:120px;
height:70px;

border:2px solid white;

border-radius:60px/35px;

margin:auto;

position:relative;

animation:glow 4s infinite;

}

@keyframes glow{

0%{box-shadow:0 0 4px rgba(255,255,255,0.2)}
50%{box-shadow:0 0 18px rgba(255,255,255,0.5)}
100%{box-shadow:0 0 4px rgba(255,255,255,0.2)}

}

.iris{

width:24px;
height:24px;

background:white;

border-radius:50%;

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

}

/* BLINK */

@keyframes blink{

0%{height:70px}
95%{height:70px}
97%{height:5px}
100%{height:70px}

}

.eye{

animation:
glow 4s infinite,
blink 6s infinite;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(4,320px);

gap:40px;

justify-content:center;

margin-bottom:50px;

}

/* WIDGET */

.widget{

width:320px;
height:198px;

background:#111827;

border-radius:14px;

display:flex;
justify-content:center;
align-items:center;

position:relative;

}

.widget:hover::after{

content:attr(title);

position:absolute;

bottom:10px;

background:black;

padding:4px 8px;

font-size:12px;

border-radius:4px;

}

/* SEARCH */

.search{

width:900px;

margin:50px auto;

display:flex;

background:#1f2937;

border-radius:16px;

overflow:hidden;

}

.search input{

flex:1;

border:none;

padding:20px;

background:transparent;

color:white;

font-size:16px;

}

.search button{

border:none;

background:#374151;

padding:0 26px;

color:white;

cursor:pointer;

}

/* TODAY INSIGHT */

.insightStrip{

width:900px;

margin:35px auto;

background:#111827;

padding:18px;

border-radius:10px;

text-align:center;

font-style:italic;

}

/* PANELS */

.panelRow{

display:flex;

justify-content:center;

gap:26px;

overflow-x:auto;

padding-bottom:20px;

}

/* PANEL */

.panel{

width:200px;
height:124px;

background:#111827;

border-radius:12px;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

position:relative;

transition:.2s;

}

.panel:hover{

background:#1f2937;
transform:scale(1.05);

}

.panel:hover::after{

content:attr(title);

position:absolute;

bottom:6px;

background:black;

padding:3px 6px;

font-size:11px;

border-radius:4px;

}

/* ICON */

.icon{

width:34px;
height:34px;

stroke:white;
fill:none;
stroke-width:2;

}

</style>

</head>

<body>

<div class="main">

<!-- AI CONCIERGE EYE -->

<div class="eyeContainer">

<div class="eye">

<div class="iris"></div>

</div>

</div>

<!-- WIDGETS -->

<div class="grid">

<div class="widget" title="Chronometer">
<canvas id="clock" width="120" height="120"></canvas>
</div>

<div class="widget" title="Calendar">
<div id="date"></div>
</div>

<div class="widget" title="News">
<div id="news">Loading news...</div>
</div>

<div class="widget" title="Weather">
<div id="weather">Loading weather...</div>
</div>

</div>

<!-- SEARCH -->

<div class="search">

<button>+</button>

<input placeholder="Ask Ein anything">

<button>Search</button>

</div>

<!-- TODAY'S INSIGHT -->

<div class="insightStrip">

Today's Insight — Curiosity is the engine of discovery.

</div>

<!-- PANELS -->

<div class="panelRow">

<div class="panel" title="Insight">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="8"/>
<line x1="12" y1="8" x2="12" y2="12"/>
<circle cx="12" cy="16" r="1"/>
</svg>

</div>

<div class="panel" title="Research">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="10" cy="10" r="6"/>
<line x1="14" y1="14" x2="20" y2="20"/>
</svg>

</div>

<div class="panel" title="Learning">

<svg class="icon" viewBox="0 0 24 24">
<path d="M4 6l8-4 8 4-8 4z"/>
<path d="M4 10l8 4 8-4"/>
</svg>

</div>

<div class="panel" title="Instruments">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<line x1="12" y1="12" x2="18" y2="6"/>
</svg>

</div>

<div class="panel" title="Health">

<svg class="icon" viewBox="0 0 24 24">
<path d="M3 12h4l2-4 4 8 2-4h6"/>
</svg>

</div>

<div class="panel" title="Pursuits">

<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<circle cx="12" cy="12" r="2"/>
</svg>

</div>

<div class="panel" title="Preferences">

<svg class="icon" viewBox="0 0 24 24">
<line x1="4" y1="6" x2="20" y2="6"/>
<circle cx="9" cy="6" r="2"/>
</svg>

</div>

<div class="panel" title="System">

<svg class="icon" viewBox="0 0 24 24">
<rect x="3" y="4" width="18" height="12"/>
</svg>

</div>

</div>

</div>

<script>

/* CLOCK */

function drawClock(){

let canvas=document.getElementById("clock")
let ctx=canvas.getContext("2d")

let r=canvas.height/2

ctx.translate(r,r)

setInterval(function(){

ctx.clearRect(-r,-r,canvas.width,canvas.height)

let now=new Date()
let sec=now.getSeconds()

let angle=sec*Math.PI/30

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(r*Math.sin(angle),-r*Math.cos(angle))

ctx.strokeStyle="white"
ctx.stroke()

},1000)

}

drawClock()

/* DATE */

document.getElementById("date").innerText =
new Date().toDateString()

</script>

</body>
</html>
