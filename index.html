<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EINBLICK</title>

<link href="https://fonts.cdnfonts.com/css/neue-einstellung" rel="stylesheet">

<style>

:root{
--widget:150px;
--icon:120px;

--space-xl:80px;
--space-md:24px;

--bg:#050505;
--panel:#0b0b0b;
--border:rgba(255,255,255,0.06);

--text:#e6e6e6;
--muted:#8c8c8c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Neue Einstellung",sans-serif;
}

body{
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
overflow-x:hidden;
}

/* wallpaper */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:120%;
height:120%;
background:
linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
background-size:60px 60px;
z-index:-1;
transition:transform .2s ease;
}

/* container */

.container{
width:92%;
max-width:900px;
display:flex;
flex-direction:column;
gap:var(--space-xl);
padding:90px 40px;
border:1px solid var(--border);
border-radius:18px;
background:rgba(10,10,10,.9);
}

/* zones */

.zone{
width:100%;
max-width:900px;
margin:auto;
}

/* EYE */

.logo-eye{
display:flex;
justify-content:center;
margin-bottom:12px;
}

.eye{
width:90px;
height:56px;
border:2px solid rgba(255,255,255,0.55);
border-radius:60px/36px;

display:flex;
align-items:center;
justify-content:center;

position:relative;
background:rgba(255,255,255,0.02);

/* optical lens depth */

box-shadow:
0 0 18px rgba(255,255,255,0.08),
0 0 40px rgba(255,255,255,0.03),
inset 0 0 12px rgba(255,255,255,0.08),
inset 0 0 30px rgba(0,0,0,0.6);
}

.pupil{
width:14px;
height:14px;
background:white;
border-radius:50%;
position:absolute;

transition:transform .15s ease;

box-shadow:
0 0 10px rgba(255,255,255,0.9),
0 0 20px rgba(255,255,255,0.6);

animation:pupilGlow 4s ease-in-out infinite;
}

/* moving highlight */

.glint{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
top:3px;
left:3px;
opacity:.85;
}

/* breathing glow */

@keyframes pupilGlow{

0%{box-shadow:0 0 10px rgba(255,255,255,0.6)}

50%{box-shadow:0 0 20px rgba(255,255,255,0.9)}

100%{box-shadow:0 0 10px rgba(255,255,255,0.6)}

}

/* brand */

.brand-name{
text-align:center;
font-size:36px;
letter-spacing:3px;
}

.slogan{
text-align:center;
color:var(--muted);
margin-top:6px;
}

/* widgets */

.widget-row{
display:grid;
grid-template-columns:repeat(4,var(--widget));
justify-content:center;
gap:var(--space-md);
}

.widget{
width:var(--widget);
height:var(--widget);
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

box-shadow:
0 6px 14px rgba(0,0,0,0.4),
0 0 8px rgba(255,255,255,0.02);

transition:.2s;
}

.widget:hover{
transform:translateY(-4px);
}

/* clock */

.clock{
width:70px;
height:70px;
border:1px solid var(--border);
border-radius:50%;
position:relative;
margin-bottom:10px;
}

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:center bottom;
background:white;
}

.hour{width:2px;height:18px}
.minute{width:2px;height:26px}
.second{width:1px;height:30px}

/* calendar */

.calendar-widget{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;
}

.calendar-day{
font-size:11px;
letter-spacing:1px;
color:var(--muted);
}

.calendar-date{
font-size:42px;
font-weight:600;
}

.calendar-month{
font-size:12px;
color:var(--muted);
}

/* search */

.search-panel{
display:flex;
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
}

.attach{
width:60px;
display:flex;
align-items:center;
justify-content:center;
}

.search-input{
flex:1;
background:transparent;
border:none;
color:white;
padding:16px;
}

.search-btn{
width:120px;
background:#111;
border:none;
color:white;
cursor:pointer;
}

/* workspace */

.workspace{
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:28px;
transition:opacity .35s ease, transform .35s ease;
}

.workspace.animate{
opacity:0;
transform:translateY(10px);
}

/* panels */

.panel-grid{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
}

.panel{
width:var(--icon);
height:var(--icon);
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;
position:relative;
transition:.2s;
}

.panel:hover{
transform:translateY(-4px);
}

.panel svg{
width:36px;
height:36px;
stroke:white;
stroke-width:1.4;
fill:none;
}

.panel-title{
position:absolute;
bottom:10px;
font-size:12px;
opacity:0;
transition:.2s;
}

.panel:hover .panel-title{
opacity:1;
}

.panel-sub{
font-size:11px;
color:var(--muted);
opacity:0;
max-height:0;
overflow:hidden;
margin-top:6px;
text-align:center;
transition:.25s;
}

.panel.active .panel-sub{
opacity:1;
max-height:40px;
}

/* reflection */

.reflection{
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:28px;
text-align:center;
}

.reflection-title{
color:var(--muted);
margin-bottom:12px;
}

.footer{
text-align:center;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="zone">

<div class="logo-eye">
<div class="eye" id="eye">

<div class="pupil" id="pupil">
<div class="glint"></div>
</div>

</div>
</div>

<div class="brand-name">EINBLICK</div>
<div class="slogan">Where Knowledge Becomes Insight</div>

</div>

<!-- widgets -->

<div class="zone widget-row">

<div class="widget">

<div class="clock">
<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
</div>

<div id="digital"></div>

</div>

<div class="widget" id="calendar"></div>

<div class="widget">News</div>

<div class="widget">Weather</div>

</div>

<!-- search -->

<div class="zone">

<div class="search-panel">
<div class="attach">📎</div>
<input id="searchInput" class="search-input" placeholder="Search Einblick">
<button class="search-btn" id="searchBtn">Search</button>
</div>

</div>

<!-- workspace -->

<div class="zone workspace" id="workspace">

<h2>Workspace</h2>

<p style="color:var(--muted);margin-top:10px">
Ready for research.
</p>

<div style="margin-top:16px;font-size:22px">● ● ●</div>

</div>

<div class="zone footer">
Created by Dr. Aishvarya Adhaulia
</div>

</div>

<script>

/* smooth pupil tracking */

const pupil=document.getElementById("pupil")
const eye=document.getElementById("eye")

document.addEventListener("mousemove",e=>{

const rect=eye.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const centerX=rect.width/2
const centerY=rect.height/2

const moveX=(x-centerX)/14
const moveY=(y-centerY)/14

pupil.style.transform=`translate(${moveX}px,${moveY}px)`

})

/* clock */

function updateClock(){

const now=new Date()

const sec=now.getSeconds()
const min=now.getMinutes()
const hr=now.getHours()%12

document.getElementById("second").style.transform=`translateX(-50%) rotate(${sec*6}deg)`
document.getElementById("minute").style.transform=`translateX(-50%) rotate(${min*6}deg)`
document.getElementById("hour").style.transform=`translateX(-50%) rotate(${hr*30+min/2}deg)`

document.getElementById("digital").textContent=
now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})

}

setInterval(updateClock,1000)
updateClock()

/* calendar */

const now=new Date()

const day=now.toLocaleDateString(undefined,{weekday:'long'})
const date=now.getDate()
const month=now.toLocaleDateString(undefined,{month:'short'})
const year=now.getFullYear()

document.getElementById("calendar").innerHTML=`
<div class="calendar-widget">
<div class="calendar-day">${day}</div>
<div class="calendar-date">${date}</div>
<div class="calendar-month">${month} ${year}</div>
</div>
`

</script>

</body>
</html>
