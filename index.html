<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EINBLICK</title>

<style>

body{
background:#0B0B0C;
color:#EAEAEA;
font-family:"Neue Einstellung",sans-serif;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

header{
margin-top:80px;
display:flex;
flex-direction:column;
align-items:center;
gap:26px;
}

.eye{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
}

@keyframes blink{
0%,95%,100%{transform:scaleY(1);}
97%{transform:scaleY(.1);}
}

.eye svg{
animation:blink 8s infinite;
}

.pupil{
transition:all .3s ease;
}

.pupil.active{
transform:scale(1.6);
filter:drop-shadow(0 0 10px white);
}

h1{
letter-spacing:8px;
margin:0;
font-weight:600;
}

.generator{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
gap:26px;
width:100%;
max-width:520px;
}

input{
width:100%;
padding:16px;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#EAEAEA;
font-size:16px;
}

button{
padding:14px 28px;
border-radius:6px;
border:none;
background:#EAEAEA;
color:#000;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.85;
}

.poster-stage{
margin-top:80px;
display:flex;
flex-direction:column;
align-items:center;
}

.poster{
width:420px;
height:560px;
background:#F4F1E8;
color:#000;
border:2px solid #222;
padding:40px;
box-sizing:border-box;
display:none;
position:relative;
}

.poster h2{
margin:0;
letter-spacing:2px;
}

.illustration{
height:240px;
border:1px dashed #333;
margin:24px 0;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.facts{
font-size:14px;
}

.metadata{
position:absolute;
bottom:20px;
right:20px;
font-size:12px;
}

.booklet{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0B0B0C;
overflow-y:auto;
padding:80px;
display:none;
}

.page{
max-width:720px;
margin:auto;
margin-bottom:120px;
}

.close{
position:fixed;
top:30px;
right:40px;
font-size:22px;
cursor:pointer;
}

footer{
margin-top:auto;
padding:60px;
opacity:.7;
}

</style>

</head>

<body>

<header>

<div class="eye">

<svg width="70" height="70" viewBox="0 0 100 100" fill="none">

<circle cx="50" cy="50" r="40" stroke="white" stroke-width="3"/>

<circle cx="50" cy="50" r="10" fill="white" class="pupil" id="pupil"/>

</svg>

</div>

<h1>EINBLICK</h1>

</header>

<div class="generator">

<input id="topic" placeholder="Explore a concept...">

<button onclick="generatePoster()">Generate Card</button>

</div>

<div class="poster-stage">

<div class="poster" id="poster"
onmousedown="startPress()"
onmouseup="cancelPress()">

<h2 id="posterTitle">TOPIC</h2>

<div class="illustration">
Scientific Diagram
</div>

<div class="facts">
• Key fact one<br>
• Key fact two<br>
• Key fact three<br>
• Key fact four
</div>

<div class="metadata">
Plate No. EC-00001<br>
⟐ EINBLICK
</div>

</div>

</div>

<div class="booklet" id="booklet">

<div class="close" onclick="closeBooklet()">✕</div>

<div class="page">
<h2>Overview</h2>
<p>Concept introduction.</p>
</div>

<div class="page">
<h2>Mechanism</h2>
<p>Explanation of how it works.</p>
</div>

<div class="page">
<h2>Applications</h2>
<p>Real-world uses.</p>
</div>

<div class="page">
<h2>Summary</h2>
<p>Final recap.</p>
</div>

</div>

<footer>

Created by Dr. Aishvarya Adhaulia

</footer>

<script>

let pressTimer

function generatePoster(){

let topic=document.getElementById("topic").value

if(topic==="")topic="Sample Topic"

document.getElementById("posterTitle").innerText=topic.toUpperCase()

document.getElementById("poster").style.display="block"

let pupil=document.getElementById("pupil")

pupil.classList.add("active")

setTimeout(()=>{

pupil.classList.remove("active")

},1000)

}

function startPress(){

pressTimer=setTimeout(openBooklet,600)

}

function cancelPress(){

clearTimeout(pressTimer)

}

function openBooklet(){

document.getElementById("booklet").style.display="block"

}

function closeBooklet(){

document.getElementById("booklet").style.display="none"

}

</script>

</body>
</html>
