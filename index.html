<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Einblick</title>

<style>

body{
font-family: system-ui;
background:#f2f2f2;
margin:0;
text-align:center;
color:#111;
}

/* HEADER */

.header{
padding:30px 20px 10px 20px;
}

.logo{
font-size:30px;
font-weight:600;
margin-top:10px;
}

.slogan{
font-size:14px;
opacity:0.6;
margin-top:4px;
}

/* AI EYE */

.eye{
width:90px;
height:90px;
border-radius:50%;
border:4px solid #111;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
margin-top:10px;
}

.pupil{
width:28px;
height:28px;
background:#111;
border-radius:50%;
transition:0.2s;
}

.eye.active .pupil{
box-shadow:0 0 18px #000;
}

/* SEARCH */

.searchBox{
margin-top:30px;
}

input{
padding:12px;
width:260px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#111;
color:white;
cursor:pointer;
margin-left:6px;
}

/* WIDGETS */

.widgets{
display:flex;
justify-content:center;
gap:18px;
margin-top:40px;
flex-wrap:wrap;
}

.widget{
background:white;
padding:15px;
border-radius:10px;
width:130px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
font-size:14px;
}

/* RESULT PANEL */

.result{
max-width:620px;
margin:auto;
margin-top:40px;
padding:22px;
background:white;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.12);
display:none;
}

.infographic{
margin-top:20px;
}

.node{
display:inline-block;
background:#111;
color:white;
padding:6px 12px;
margin:5px;
border-radius:20px;
font-size:12px;
}

/* FOOTER */

.footer{
margin-top:50px;
font-size:12px;
opacity:0.7;
}

/* MOBILE */

@media (max-width:600px){

.widgets{
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<div class="header">

<div class="eye" id="eye">
<div class="pupil"></div>
</div>

<div class="logo">Einblick</div>
<div class="slogan">Where Knowledge Becomes Insight</div>

</div>


<div class="searchBox">

<input id="query" placeholder="Ask something">

<button onclick="search()">Search</button>

</div>


<div class="widgets">

<div class="widget">
Time<br>
<span id="clock"></span>
</div>

<div class="widget">
Date<br>
<span id="calendar"></span>
</div>

<div class="widget">
News<br>
<span style="font-size:12px;">Demo feed</span>
</div>

<div class="widget">
Weather<br>
<span style="font-size:12px;">Demo</span>
</div>

</div>


<div id="result" class="result">

<h3 id="title"></h3>

<p id="answer"></p>

<div class="infographic" id="infographic"></div>

<h4>Explore Further</h4>

<div id="curiosity"></div>

</div>


<div class="footer">
Created by Dr. Aishvarya Adhaulia
</div>


<script>

/* CLOCK */

function updateClock(){

let now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString();

}

setInterval(updateClock,1000);


/* CALENDAR */

let today = new Date();

document.getElementById("calendar").innerHTML =
today.toDateString();


/* BLINKING EYE */

setInterval(()=>{

let pupil=document.querySelector(".pupil");

pupil.style.transform="scaleY(0.1)";

setTimeout(()=>{
pupil.style.transform="scaleY(1)";
},150);

},5000);


/* KNOWLEDGE DATABASE */

const knowledge = [

{
keywords:["black hole","black holes"],
title:"Black Hole",
text:"A black hole is a region of spacetime where gravity is so strong that nothing, not even light, can escape.",
nodes:["Gravity","Relativity","Event Horizon","Singularity"],
curiosity:[
"How do black holes form?",
"What is Hawking radiation?",
"Can black holes evaporate?"
]
},

{
keywords:["dna","genetics"],
title:"DNA",
text:"DNA is the molecule that carries genetic instructions for the development and functioning of living organisms.",
nodes:["Cells","Genes","Proteins","Evolution"],
curiosity:[
"How does DNA replicate?",
"What are mutations?",
"How does DNA influence evolution?"
]
},

{
keywords:["gravity"],
title:"Gravity",
text:"Gravity is the force by which objects with mass attract each other.",
nodes:["Newton","Relativity","Planets","Orbit"],
curiosity:[
"What is general relativity?",
"How does gravity affect time?",
"What are gravitational waves?"
]
}

];


/* ENTER KEY SEARCH */

document.getElementById("query").addEventListener("keypress",function(e){

if(e.key==="Enter"){
search();
}

});


/* SEARCH FUNCTION */

function search(){

let q=document.getElementById("query").value.toLowerCase();

if(q.trim()==="") return;

let eye=document.getElementById("eye");
eye.classList.add("active");

setTimeout(()=>eye.classList.remove("active"),1000);

let data = knowledge.find(item =>
item.keywords.some(k => q.includes(k))
);

if(!data){

alert("No demo data yet. Try: black hole, dna, gravity");

return;

}

document.getElementById("result").style.display="block";

document.getElementById("title").innerText=data.title;

document.getElementById("answer").innerText=data.text;


/* INFOGRAPHIC */

let inf=document.getElementById("infographic");

inf.innerHTML="";

data.nodes.forEach(n=>{

let span=document.createElement("span");

span.className="node";

span.innerText=n;

inf.appendChild(span);

});


/* CURIOSITY */

let cur=document.getElementById("curiosity");

cur.innerHTML="";

data.curiosity.forEach(c=>{

let div=document.createElement("div");

div.innerText="• "+c;

cur.appendChild(div);

});

}

</script>

</body>
</html>
