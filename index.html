<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Einblick</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

/* GLOBAL */

body{
margin:0;
font-family:"Neue Einstellung","Inter",sans-serif;
background: radial-gradient(circle at top left,#141821,#0f1115);
color:#e8eaed;
display:flex;
justify-content:center;
}

.container{
max-width:1100px;
width:100%;
text-align:center;
padding:40px 20px;
}

/* LOGO */

.eye{
width:70px;
height:70px;
border:2px solid #9aa4b2;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
}

.pupil{
width:16px;
height:16px;
background:#e8eaed;
border-radius:50%;
transition:all .3s;
}

/* BRAND */

.brand{
font-size:28px;
font-weight:600;
margin-bottom:6px;
}

.slogan{
font-size:14px;
opacity:.6;
margin-bottom:36px;
}

/* WIDGETS */

.widgets{
display:flex;
justify-content:center;
gap:24px;
margin-bottom:32px;
}

.widget{
width:162px;
height:100px;
background:#171a21;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* SEARCH */

.searchbar{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:30px;
}

.searchbar input{
width:380px;
height:40px;
background:#171a21;
border:none;
border-radius:8px;
color:white;
padding-left:12px;
}

.btn{
height:40px;
padding:0 16px;
border:none;
border-radius:8px;
background:#171a21;
color:white;
cursor:pointer;
}

/* REFLECTION */

.reflection{
background:#171a21;
border-radius:10px;
padding:16px;
margin-bottom:32px;
}

/* PANELS */

.panels{
display:flex;
gap:24px;
overflow-x:auto;
justify-content:center;
margin-bottom:40px;
}

.panel{
width:146px;
height:90px;
background:#171a21;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* CREATOR */

.creator{
font-size:12px;
opacity:.6;
margin-top:10px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#171a21;
width:80%;
height:70%;
border-radius:12px;
padding:30px;
overflow:auto;
}

.close{
float:right;
cursor:pointer;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="eye" id="eye">
<div class="pupil" id="pupil"></div>
</div>

<div class="brand">Einblick</div>
<div class="slogan">Where Knowledge Becomes Insight</div>

<div class="widgets">

<div class="widget">
<div id="clock"></div>
</div>

<div class="widget">
<div id="date"></div>
</div>

<div class="widget">
News
</div>

<div class="widget">
Weather
</div>

</div>

<div class="searchbar">

<button class="btn">📎</button>

<input id="searchInput" placeholder="Search">

<button class="btn" id="searchBtn">Search</button>

</div>

<div class="reflection">
Today's Reflection
</div>

<div class="panels">

<div class="panel">Insight</div>
<div class="panel">Learning</div>
<div class="panel">Research</div>
<div class="panel">Instruments</div>
<div class="panel">Health</div>
<div class="panel">Pursuits</div>
<div class="panel">Preferences</div>
<div class="panel">System</div>

</div>

<div class="creator">
Created by Dr. Aishvarya Adhaulia
</div>

</div>

<div class="popup" id="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">✕</span>

<h2 id="resultTitle"></h2>

<p id="resultText"></p>

</div>

</div>

<script>

/* CLOCK */

function updateClock(){

const now = new Date();

document.getElementById("clock").innerText =
now.toLocaleTimeString();

document.getElementById("date").innerText =
now.toDateString();

}

setInterval(updateClock,1000);
updateClock();

/* BLINK */

setInterval(()=>{

const pupil=document.getElementById("pupil");

pupil.style.height="4px";

setTimeout(()=>{

pupil.style.height="16px";

},150);

},5000);

/* SEARCH BUTTON */

let timer;

const btn=document.getElementById("searchBtn");

btn.addEventListener("mousedown",()=>{

timer=setTimeout(()=>{

deepResearch();

},800);

});

btn.addEventListener("mouseup",()=>{

clearTimeout(timer);

normalSearch();

});

function normalSearch(){

openPopup("Quick Insight",
"Prototype search result.");

}

function deepResearch(){

btn.style.boxShadow="0 0 16px #9aa4b2";

openPopup("Deep Research",
"Advanced analysis mode activated.");

}

/* POPUP */

function openPopup(title,text){

document.getElementById("popup").style.display="flex";

document.getElementById("resultTitle").innerText=title;

document.getElementById("resultText").innerText=text;

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
