<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EINBLICK</title>

<style>

body{
background:#0B0B0C;
color:#EAEAEA;
font-family:"Neue Einstellung",sans-serif;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

header{
margin-top:80px;
display:flex;
flex-direction:column;
align-items:center;
gap:24px;
}

/* EYE */

.eye{
width:140px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
}

.eye svg{
overflow:visible;
}

/* blink */

@keyframes blink{
0%,92%,100%{transform:scaleY(1)}
95%{transform:scaleY(.08)}
}

.eye{
animation:blink 7s infinite;
}

/* pupil */

#pupil{
transition:all .25s ease;
filter:drop-shadow(0 0 4px rgba(255,255,255,.25));
}

#pupil.active{
transform:scale(1.5);
filter:drop-shadow(0 0 12px white);
}

/* TITLE */

h1{
letter-spacing:8px;
margin:0;
font-weight:600;
}

/* INPUT */

.generator{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
gap:24px;
width:100%;
max-width:520px;
}

input{
width:100%;
padding:16px;
border-radius:10px;
border:1px solid #333;
background:#111;
color:#EAEAEA;
font-size:16px;
}

button{
padding:14px 28px;
border-radius:6px;
border:none;
background:#EAEAEA;
color:#000;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.85;
}

/* POSTER */

.poster-stage{
margin-top:80px;
display:flex;
flex-direction:column;
align-items:center;
}

.poster{
width:420px;
height:560px;
background:#F4F1E8;
color:#000;
border:2px solid #222;
padding:40px;
box-sizing:border-box;
display:none;
position:relative;
}

.poster h2{
margin:0;
letter-spacing:2px;
}

.illustration{
height:240px;
border:1px dashed #333;
margin:24px 0;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.metadata{
position:absolute;
bottom:20px;
right:20px;
font-size:12px;
}

/* BOOKLET */

.booklet{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0B0B0C;
overflow-y:auto;
padding:80px;
display:none;
}

.page{
max-width:720px;
margin:auto;
margin-bottom:120px;
}

.close{
position:fixed;
top:30px;
right:40px;
font-size:22px;
cursor:pointer;
}

footer{
margin-top:auto;
padding:60px;
opacity:.7;
}

</style>

</head>

<body>

<header>

<div class="eye">

<svg width="140" height="90" viewBox="0 0 140 90">

<ellipse
cx="70"
cy="45"
rx="55"
ry="25"
stroke="white"
stroke-width="2"
fill="none"
/>

<circle
cx="70"
cy="45"
r="8"
fill="white"
id="pupil"
/>

</svg>

</div>

<h1>EINBLICK</h1>

</header>

<div class="generator">

<input id="topic" placeholder="Explore a concept...">

<button onclick="generatePoster()">Generate Card</button>

</div>

<div class="poster-stage">

<div class="poster" id="poster"
onmousedown="startPress()"
onmouseup="cancelPress()">

<h2 id="posterTitle">TOPIC</h2>

<div class="illustration">
Scientific Diagram
</div>

<div class="metadata">
Plate No. EC-00001<br>
⟐ EINBLICK
</div>

</div>

</div>

<div class="booklet" id="booklet">

<div class="close" onclick="closeBooklet()">✕</div>

<div class="page">
<h2>Overview</h2>
<p>Concept introduction.</p>
</div>

<div class="page">
<h2>Mechanism</h2>
<p>Explanation of how it works.</p>
</div>

<div class="page">
<h2>Applications</h2>
<p>Real-world uses.</p>
</div>

<div class="page">
<h2>Summary</h2>
<p>Final recap.</p>
</div>

</div>

<footer>

Created by Dr. Aishvarya Adhaulia

</footer>

<script>

/* pupil tracking */

const pupil=document.getElementById("pupil")

document.addEventListener("mousemove",e=>{

const rect=pupil.ownerSVGElement.getBoundingClientRect()

const centerX=rect.left+rect.width/2
const centerY=rect.top+rect.height/2

const dx=(e.clientX-centerX)/25
const dy=(e.clientY-centerY)/25

pupil.setAttribute("cx",70+dx)
pupil.setAttribute("cy",45+dy)

})

/* generation */

function generatePoster(){

let topic=document.getElementById("topic").value

if(topic==="")topic="Sample Topic"

document.getElementById("posterTitle").innerText=topic.toUpperCase()

document.getElementById("poster").style.display="block"

/* eye focus */

pupil.classList.add("active")

setTimeout(()=>{
pupil.classList.remove("active")
},900)

}

/* booklet */

let pressTimer

function startPress(){

pressTimer=setTimeout(openBooklet,600)

}

function cancelPress(){

clearTimeout(pressTimer)

}

function openBooklet(){

document.getElementById("booklet").style.display="block"

}

function closeBooklet(){

document.getElementById("booklet").style.display="none"

}

</script>

</body>
</html>
