<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EINBLICK</title>

<style>

body{
margin:0;
font-family:"Neue Einstellung",sans-serif;
color:#EAEAEA;
background:#0B0B0C;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* background */

.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background-image:
radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
background-size:80px 80px,140px 140px;
animation:spaceDrift 60s linear infinite;
opacity:.25;
}

@keyframes spaceDrift{
0%{transform:translate(0,0)}
100%{transform:translate(-120px,-80px)}
}

/* stage */

.stage{
display:flex;
flex-direction:column;
align-items:center;
gap:48px;
width:100%;
max-width:480px;
}

/* eye */

.eye{
width:160px;
height:100px;
display:flex;
align-items:center;
justify-content:center;
animation:blink 7s infinite;
margin-bottom:-10px;
}

@keyframes blink{
0%,92%,100%{transform:scaleY(1)}
95%{transform:scaleY(.08)}
}

#pupil{
transition:.35s ease;
}

/* title */

h1{
margin:0;
letter-spacing:.18em;
font-weight:500;
position:relative;
left:2px;
}

/* generator */

.generator{
display:flex;
flex-direction:column;
align-items:center;
gap:26px;
width:100%;
}

input{
width:100%;
background:transparent;
border:none;
border-bottom:1.5px solid #444;
padding:14px 0;
font-size:16px;
color:#EAEAEA;
text-align:center;
}

input:focus{
outline:none;
border-bottom:1.5px solid white;
}

/* button */

button{
width:100%;
padding:13px;
border-radius:2px;
border:1px solid rgba(255,255,255,.25);
background:linear-gradient(
to bottom,
rgba(255,255,255,.12),
rgba(255,255,255,.06)
);
color:#EAEAEA;
font-weight:600;
letter-spacing:.06em;
cursor:pointer;
transition:.18s ease;
}

button:hover{
background:rgba(255,255,255,.18);
}

/* modal */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
backdrop-filter:blur(6px);
z-index:10;
}

.modal-content{
background:#111;
margin:12% auto;
padding:40px;
border-radius:10px;
width:90%;
max-width:600px;
color:white;
}

.close{
float:right;
font-size:22px;
cursor:pointer;
}

/* creator */

footer{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:480px;
max-width:90vw;
display:flex;
justify-content:center;
font-size:14px;
opacity:.6;
}

</style>
</head>

<body>

<div class="space"></div>

<div class="stage">

<div class="eye">

<svg width="160" height="100" viewBox="0 0 140 90">

<ellipse cx="70" cy="45" rx="55" ry="25"
stroke="white" stroke-width="2.6" fill="none"/>

<circle cx="70" cy="45" r="8"
fill="white" id="pupil"/>

</svg>

</div>

<h1>EINBLICK</h1>

<div class="generator">

<input id="topic" placeholder="Subject">

<button onclick="startResearch()">Research</button>

</div>

</div>

<footer>
<span onclick="openCreator()">Creator</span>
</footer>

<!-- Insight Card -->

<div id="resultModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeResult()">×</span>

<h2 id="cardTitle"></h2>

<p id="definition"></p>

<p id="principle"></p>

<p id="history"></p>

<p id="application"></p>

<p id="fact"></p>

<button onclick="openBooklet()">Open Booklet</button>

</div>
</div>

<!-- Creator -->

<div id="creatorModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeCreator()">×</span>

<h2>Creator</h2>

<p>Dr. Aishvarya Adhaulia</p>

</div>
</div>

<script>

/* knowledge generator */

function generateKnowledge(topic){

return{

title:topic,

definition:
topic+" is a subject of study with important scientific, historical, or cultural significance.",

principle:
"The core principle of "+topic+" involves understanding its underlying mechanisms and relationships.",

history:
"The study of "+topic+" developed through centuries of intellectual inquiry and discovery.",

application:
topic+" has modern applications in science, technology, and everyday life.",

fact:
"One fascinating aspect of "+topic+" is how it connects multiple fields of knowledge."

}

}

/* research */

let currentBooklet=""

function startResearch(){

let topic=document.getElementById("topic").value

if(topic==="") topic="Subject"

let data=generateKnowledge(topic)

document.getElementById("cardTitle").innerText=data.title
document.getElementById("definition").innerText=data.definition
document.getElementById("principle").innerText=data.principle
document.getElementById("history").innerText=data.history
document.getElementById("application").innerText=data.application
document.getElementById("fact").innerText=data.fact

currentBooklet=generateBooklet(data)

document.getElementById("resultModal").style.display="block"

}

/* booklet generator */

function generateBooklet(data){

let pages=[

["Title",data.title],

["Definition",data.definition],

["Principle",data.principle],

["History",data.history],

["Key Figures","Important thinkers contributed to "+data.title+"."],

["Mechanism","Understanding how "+data.title+" works requires detailed study."],

["Applications",data.application],

["Modern Research","Scientists continue exploring "+data.title+" today."],

["Interesting Facts",data.fact],

["Summary",data.title+" remains a fascinating topic for exploration."]

]

let html="<html><head><title>"+data.title+"</title></head><body style='font-family:Neue Einstellung, sans-serif;background:#111;color:white;padding:40px'>"

pages.forEach(p=>{
html+="<h1>"+p[0]+"</h1><p>"+p[1]+"</p><hr>"
})

html+="</body></html>"

return html

}

/* open booklet */

function openBooklet(){

let win=window.open()
win.document.write(currentBooklet)

}

/* modals */

function closeResult(){
document.getElementById("resultModal").style.display="none"
}

function openCreator(){
document.getElementById("creatorModal").style.display="block"
}

function closeCreator(){
document.getElementById("creatorModal").style.display="none"
}

</script>

</body>
</html>
