<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Einblick</title>

<style>

/* Dynamic background */

body{

background:linear-gradient(270deg,#0b0f14,#141a24,#0b0f14);

background-size:600% 600%;

animation:bgMove 25s ease infinite;

color:white;

font-family:-apple-system,BlinkMacSystemFont,Segoe UI;

text-align:center;

margin:0;

padding:20px;

}

@keyframes bgMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* Title */

h1{

letter-spacing:3px;

}

/* Eye */

.eye{

width:110px;
height:65px;
background:#e6e6e6;
border-radius:50%/60%;
margin:auto;
position:relative;

}

.pupil{

width:28px;
height:28px;
background:#111;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

}

.pupil.active{

box-shadow:0 0 25px white;

}

/* slogan */

.slogan{

opacity:.7;
margin-top:10px;

}

/* greeting */

#greeting{

margin-top:6px;
opacity:.8;

}

/* widgets */

.dashboard{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;

}

.widget{

background:#151a21;

padding:18px;

margin:15px;

border-radius:16px;

width:180px;

box-shadow:0 10px 25px rgba(0,0,0,.35);

}

.clock{

font-size:20px;

}

/* search */

input{

width:85%;

padding:14px;

border-radius:12px;

border:none;

background:#1e2530;

color:white;

font-size:16px;

}

/* buttons */

button{

padding:10px 14px;

margin:6px;

border-radius:10px;

border:none;

background:#d8d8d8;

}

/* breathing */

.breath{

width:80px;
height:80px;
border-radius:50%;
background:#444;
margin:auto;
animation:breathe 6s infinite;

}

@keyframes breathe{

0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}

}

/* creator */

.creator{

opacity:.5;
margin-top:40px;
font-size:12px;

}

</style>

</head>

<body>

<h1>EINBLICK</h1>

<div class="eye">

<div class="pupil" id="pupil"></div>

</div>

<div class="slogan">

Where Knowledge Becomes Insight

</div>

<div id="greeting"></div>

<!-- Observation Panel -->

<div class="dashboard">

<div class="widget">

<h3>Chronometer</h3>

<canvas id="analogClock" width="140" height="140"></canvas>

<div id="digitalClock" class="clock"></div>

</div>

<div class="widget">

<h3>Calendar</h3>

<div id="calendarDate"></div>

<div id="calendarDay"></div>

</div>

</div>

<!-- Ask Ein -->

<div class="widget">

<input id="query" placeholder="Ask Ein..." onkeydown="if(event.key==='Enter'){searchInsight()}">

</div>

<!-- Insight -->

<div class="widget" id="insightCard" style="display:none">

<h3>Insight</h3>

<p id="insightText"></p>

</div>

<!-- Instruments -->

<div class="widget">

<h3>Instruments</h3>

<button onclick="openCalc()">Calculator</button>

<button onclick="toggleStopwatch()">Stopwatch</button>

</div>

<!-- Calculator -->

<div class="widget" id="calculator" style="display:none">

<input id="calcInput">

<button onclick="calculate()">=</button>

<p id="calcResult"></p>

</div>

<!-- Stopwatch -->

<div class="widget" id="stopwatchWidget" style="display:none">

<div id="stopwatch">00:00</div>

<button onclick="startSW()">Start</button>

<button onclick="stopSW()">Stop</button>

<button onclick="resetSW()">Reset</button>

</div>

<!-- Wellness -->

<div class="widget">

<h3>Wellness</h3>

<div class="breath"></div>

<p>Breathing Guide</p>

</div>

<div class="creator">

Created by Dr. Aishvarya Adhaulia

</div>

<script>

/* Greeting */

function greeting(){

let hour=new Date().getHours()

let msg="Hello"

if(hour<12) msg="Good Morning"
else if(hour<18) msg="Good Afternoon"
else msg="Good Evening"

document.getElementById("greeting").innerHTML=

msg+", Dr. Aishvarya"

}

greeting()

/* Calendar */

function updateCalendar(){

let now=new Date()

document.getElementById("calendarDate").innerHTML=
now.toLocaleDateString()

document.getElementById("calendarDay").innerHTML=
now.toLocaleDateString(undefined,{weekday:'long'})

}

updateCalendar()

/* Analog Clock */

let canvas=document.getElementById("analogClock")

let ctx=canvas.getContext("2d")

let radius=canvas.height/2

ctx.translate(radius,radius)

radius*=0.9

function drawClock(){

drawFace()
drawTime()

requestAnimationFrame(drawClock)

}

function drawFace(){

ctx.beginPath()
ctx.arc(0,0,radius,0,2*Math.PI)
ctx.fillStyle="#111"
ctx.fill()

}

function drawTime(){

let now=new Date()

let hour=now.getHours()%12
let minute=now.getMinutes()
let second=now.getSeconds()

hour=(hour*Math.PI/6)+(minute*Math.PI/(6*60))
drawHand(hour,radius*0.5,4)

minute=(minute*Math.PI/30)
drawHand(minute,radius*0.75,3)

second=(second*Math.PI/30)
drawHand(second,radius*0.85,2)

document.getElementById("digitalClock").innerHTML=
now.toLocaleTimeString()

}

function drawHand(pos,length,width){

ctx.beginPath()
ctx.lineWidth=width
ctx.moveTo(0,0)
ctx.rotate(pos)
ctx.lineTo(0,-length)
ctx.stroke()
ctx.rotate(-pos)

}

drawClock()

/* Insight Engine */

async function searchInsight(){

let pupil=document.getElementById("pupil")

pupil.classList.add("active")

let query=document.getElementById("query").value

try{

let r=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+query)

let d=await r.json()

document.getElementById("insightText").innerText=d.extract

document.getElementById("insightCard").style.display="block"

}

catch{

document.getElementById("insightText").innerText="Insight unavailable."

}

pupil.classList.remove("active")

}

/* Calculator */

function openCalc(){

let c=document.getElementById("calculator")

c.style.display=(c.style.display=="none")?"block":"none"

}

function calculate(){

let val=document.getElementById("calcInput").value

document.getElementById("calcResult").innerText=eval(val)

}

/* Stopwatch */

let sw=0
let timer=null

function toggleStopwatch(){

let s=document.getElementById("stopwatchWidget")

s.style.display=(s.style.display=="none")?"block":"none"

}

function startSW(){

if(!timer){

timer=setInterval(function(){

sw++

let m=Math.floor(sw/60)
let s=sw%60

document.getElementById("stopwatch").innerText=

String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

},1000)

}

}

function stopSW(){

clearInterval(timer)
timer=null

}

function resetSW(){

sw=0
document.getElementById("stopwatch").innerText="00:00"

}

</script>

</body>

</html>
