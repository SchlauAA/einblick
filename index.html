<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Einblick</title>

<style>

/* Dynamic Wallpaper */

body{

background:linear-gradient(270deg,#0b0f14,#111826,#0b0f14);

background-size:600% 600%;

animation:bgMove 30s ease infinite;

color:white;

font-family:-apple-system,BlinkMacSystemFont,Segoe UI;

text-align:center;

margin:0;

padding:20px;

}

@keyframes bgMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* Title */

h1{

letter-spacing:3px;
margin-bottom:5px;

}

/* Eye */

.eye-container{

display:flex;
justify-content:center;
margin-top:20px;

}

.eye{

width:110px;
height:65px;
background:#e6e6e6;
border-radius:50%/60%;
position:relative;
box-shadow:0 0 14px rgba(0,0,0,0.7) inset;
animation:blink 9s infinite;

}

.pupil{

width:28px;
height:28px;
background:#111;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:all .3s;

}

.pupil.active{

box-shadow:0 0 25px white;

}

@keyframes blink{

0%{transform:scaleY(1)}
96%{transform:scaleY(1)}
98%{transform:scaleY(.05)}
100%{transform:scaleY(1)}

}

/* slogan */

.slogan{

opacity:.7;
font-size:15px;
margin-top:10px;

}

/* widgets */

.widget{

background:#151a21;

padding:20px;

margin:20px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.35);

transition:transform .2s;

}

.widget:hover{

transform:scale(1.04);

}

/* clock */

.clock{

font-size:32px;

}

/* search */

input{

width:85%;

padding:14px;

border-radius:12px;

border:none;

background:#1e2530;

color:white;

font-size:16px;

}

/* buttons */

button{

padding:12px 16px;

margin:8px;

border-radius:12px;

border:none;

background:#d8d8d8;

color:black;

cursor:pointer;

transition:transform .15s;

}

button:active{

transform:scale(.9);

}

/* breathing */

.breath{

width:90px;
height:90px;
border-radius:50%;
background:#444;
margin:auto;
animation:breathe 6s infinite;

}

@keyframes breathe{

0%{transform:scale(1)}
50%{transform:scale(1.5)}
100%{transform:scale(1)}

}

/* insight */

#insightCard{

display:none;

}

/* stopwatch */

.stopwatch{

font-size:28px;

}

/* creator */

.creator{

opacity:.5;
margin-top:40px;
font-size:12px;

}

</style>

</head>

<body>

<h1>EINBLICK</h1>

<div class="eye-container">

<div class="eye">

<div class="pupil" id="pupil"></div>

</div>

</div>

<div class="slogan">

Where Knowledge Becomes Insight

</div>

<!-- Chronometer -->

<div class="widget">

<h3>Chronometer</h3>

<div id="clock" class="clock"></div>

<div id="utc"></div>

</div>

<!-- Ask Ein -->

<div class="widget">

<input id="query" placeholder="Ask Ein..." onkeydown="if(event.key==='Enter'){searchInsight()}">

</div>

<!-- Insight -->

<div class="widget" id="insightCard">

<h3>Insight</h3>

<p id="insightText"></p>

</div>

<!-- Instruments -->

<div class="widget">

<h3>Instruments</h3>

<button onclick="openCalc()">Calculator</button>

<button onclick="toggleStopwatch()">Stopwatch</button>

</div>

<!-- Calculator -->

<div class="widget" id="calculator" style="display:none">

<input id="calcInput">

<button onclick="calculate()">=</button>

<p id="calcResult"></p>

</div>

<!-- Stopwatch -->

<div class="widget" id="stopwatchWidget" style="display:none">

<div id="stopwatch" class="stopwatch">00:00</div>

<button onclick="startSW()">Start</button>

<button onclick="stopSW()">Stop</button>

<button onclick="resetSW()">Reset</button>

</div>

<!-- Wellness -->

<div class="widget">

<h3>Wellness</h3>

<div class="breath"></div>

<p>Breathing Guide</p>

</div>

<div class="creator">

Created by Dr. Aishvarya Adhaulia

</div>

<script>

/* CLOCK */

function updateClock(){

let now=new Date()

document.getElementById("clock").innerHTML=

now.toLocaleTimeString()

document.getElementById("utc").innerHTML=

"UTC "+now.toUTCString().slice(17,25)

}

setInterval(updateClock,1000)

updateClock()

/* INSIGHT */

async function searchInsight(){

let pupil=document.getElementById("pupil")

pupil.classList.add("active")

let query=document.getElementById("query").value

try{

let r=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+query)

let d=await r.json()

document.getElementById("insightText").innerText=d.extract

document.getElementById("insightCard").style.display="block"

}

catch{

document.getElementById("insightText").innerText="Insight unavailable."

}

pupil.classList.remove("active")

}

/* calculator */

function openCalc(){

let c=document.getElementById("calculator")

c.style.display=(c.style.display=="none")?"block":"none"

}

function calculate(){

let val=document.getElementById("calcInput").value

document.getElementById("calcResult").innerText=eval(val)

}

/* stopwatch */

let sw=0
let timer=null

function toggleStopwatch(){

let s=document.getElementById("stopwatchWidget")

s.style.display=(s.style.display=="none")?"block":"none"

}

function startSW(){

if(!timer){

timer=setInterval(function(){

sw++

let m=Math.floor(sw/60)
let s=sw%60

document.getElementById("stopwatch").innerText=

String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

},1000)

}

}

function stopSW(){

clearInterval(timer)

timer=null

}

function resetSW(){

sw=0

document.getElementById("stopwatch").innerText="00:00"

}

</script>

</body>

</html>
