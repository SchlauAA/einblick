<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EINBLICK</title>

<style>

body{
margin:0;
font-family:"Neue Einstellung",sans-serif;
color:#EAEAEA;
background:#0B0B0C;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background-image:
radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
background-size:80px 80px,140px 140px;
animation:spaceDrift 60s linear infinite;
opacity:.25;
}

@keyframes spaceDrift{
0%{transform:translate(0,0)}
100%{transform:translate(-120px,-80px)}
}

.stage{
display:flex;
flex-direction:column;
align-items:center;
gap:48px;
width:100%;
max-width:480px;
}

.eye{
width:160px;
height:100px;
display:flex;
align-items:center;
justify-content:center;
animation:blink 7s infinite;
margin-bottom:-10px;
}

@keyframes blink{
0%,92%,100%{transform:scaleY(1)}
95%{transform:scaleY(.08)}
}

#pupil{transition:.25s ease;}

h1{
margin:0;
letter-spacing:.18em;
font-weight:500;
position:relative;
left:2px;
}

.generator{
display:flex;
flex-direction:column;
align-items:center;
gap:26px;
width:100%;
}

input{
width:100%;
background:transparent;
border:none;
border-bottom:1.5px solid #444;
padding:14px 0;
font-size:16px;
color:#EAEAEA;
text-align:center;
}

input:focus{
outline:none;
border-bottom:1.5px solid white;
}

button{
width:100%;
padding:13px;
border-radius:2px;
border:1px solid rgba(255,255,255,.25);
background:linear-gradient(
to bottom,
rgba(255,255,255,.12),
rgba(255,255,255,.06)
);
color:#EAEAEA;
font-weight:600;
letter-spacing:.06em;
cursor:pointer;
}

footer{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:480px;
max-width:90vw;
display:flex;
justify-content:center;
font-size:14px;
opacity:.6;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
backdrop-filter:blur(6px);
z-index:10;
}

.insight-card{
background:#F4F1E8;
color:#111;
margin:8% auto;
padding:40px;
width:90%;
max-width:520px;
border:1px solid #222;
box-shadow:0 0 30px rgba(0,0,0,.6);
font-family:Georgia,serif;
}

.card-title{
text-align:center;
font-size:28px;
letter-spacing:.08em;
margin-bottom:30px;
}

.diagram-area{
height:140px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:25px;
}

.card-section{margin-bottom:14px;}

.card-button{margin-top:24px;}

.card-button button{
background:#111;
color:#F4F1E8;
border:none;
}

#constellation div{
margin-top:6px;
cursor:pointer;
}

.close{
float:right;
font-size:22px;
cursor:pointer;
}

.modal-content{
background:#111;
margin:12% auto;
padding:40px;
border-radius:10px;
width:90%;
max-width:600px;
color:white;
}

</style>
</head>

<body>

<div class="space"></div>

<div class="stage">

<div class="eye">
<svg width="160" height="100" viewBox="0 0 140 90">
<ellipse cx="70" cy="45" rx="55" ry="25"
stroke="white" stroke-width="2.6" fill="none"/>
<circle cx="70" cy="45" r="8" fill="white" id="pupil"/>
</svg>
</div>

<h1>EINBLICK</h1>

<div class="generator">
<input id="topic" placeholder="Subject">
<button onclick="startResearch()">Research</button>
</div>

</div>

<footer>
<span onclick="openCreator()">Creator</span>
</footer>

<div id="resultModal" class="modal">
<div class="insight-card">

<span class="close" onclick="closeResult()">×</span>

<div class="card-title" id="cardTitle"></div>

<div class="diagram-area" id="diagramArea"></div>

<div class="card-section"><strong>Definition</strong><span id="definition"></span></div>
<div class="card-section"><strong>Principle</strong><span id="principle"></span></div>
<div class="card-section"><strong>History</strong><span id="history"></span></div>
<div class="card-section"><strong>Application</strong><span id="application"></span></div>
<div class="card-section"><strong>Interesting Fact</strong><span id="fact"></span></div>

<div class="card-section">
<strong>Related Insights</strong>
<div id="constellation"></div>
</div>

<div class="card-button">
<button onclick="openBooklet()">Open Booklet</button>
</div>

</div>
</div>

<div id="creatorModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeCreator()">×</span>
<h2>Creator</h2>
<p>Dr. Aishvarya Adhaulia</p>
</div>
</div>

<script>

/* ---------------- RESEARCH MEMORY ---------------- */

let researchHistory=[]
let researchTrail=[]

function storeResearch(topic){
if(!researchHistory.includes(topic)){researchHistory.push(topic)}
}

function recordTrail(topic){researchTrail.push(topic)}

function getResearchTrail(){return researchTrail.join(" → ")}

/* ---------------- TOPIC CLASSIFIER ---------------- */

function classifyTopic(topic){

topic=topic.toLowerCase()

if(topic.includes("quantum")) return "physics"
if(topic.includes("black hole")) return "astrophysics"
if(topic.includes("car")||topic.includes("ferrari")) return "automotive"
if(topic.includes("ai")||topic.includes("android")) return "technology"

return "general"

}

/* ---------------- EYE ENGINE ---------------- */

const pupil=document.getElementById("pupil")
const eye=document.querySelector(".eye")

let eyeCenterX,eyeCenterY

function updateEyeCenter(){
const rect=eye.getBoundingClientRect()
eyeCenterX=rect.left+rect.width/2
eyeCenterY=rect.top+rect.height/2
}

updateEyeCenter()
window.addEventListener("resize",updateEyeCenter)

document.addEventListener("mousemove",e=>{

let dx=e.clientX-eyeCenterX
let dy=e.clientY-eyeCenterY

let dist=Math.sqrt(dx*dx+dy*dy)
let max=12

if(dist>max){
dx=dx/dist*max
dy=dy/dist*max
}

pupil.setAttribute("cx",70+dx)
pupil.setAttribute("cy",45+dy)

})

setInterval(()=>{
pupil.setAttribute("r",9)
setTimeout(()=>{pupil.setAttribute("r",7)},600)
},4000)

function activateEye(){

pupil.style.filter="drop-shadow(0 0 10px white)"
pupil.setAttribute("r",14)

setTimeout(()=>{
pupil.style.filter="none"
pupil.setAttribute("r",8)
},700)

}

/* ---------------- SCAN ---------------- */

function scanEye(callback){

pupil.setAttribute("cx",70)

setTimeout(()=>{pupil.setAttribute("cx",60)},300)
setTimeout(()=>{pupil.setAttribute("cx",80)},600)
setTimeout(()=>{pupil.setAttribute("cx",70)},900)

setTimeout(()=>{
activateEye()
if(callback) callback()
},1100)

}

/* ---------------- DIAGRAM ENGINE ---------------- */

function generateDiagram(topic){

topic=topic.toLowerCase()

if(topic.includes("quantum")){
return `<svg width="220" height="80">
<circle cx="40" cy="40" r="6" fill="black"/>
<circle cx="180" cy="40" r="6" fill="black"/>
<line x1="46" y1="40" x2="174" y2="40"
stroke="black" stroke-width="2"/>
</svg>`
}

if(topic.includes("black hole")){
return `<svg width="200" height="120">
<ellipse cx="100" cy="60" rx="60" ry="20"
fill="none" stroke="black"/>
<circle cx="100" cy="60" r="8" fill="black"/>
</svg>`
}

return `<svg width="200" height="120">
<circle cx="100" cy="40" r="8" fill="black"/>
<circle cx="60" cy="80" r="6" fill="black"/>
<circle cx="140" cy="80" r="6" fill="black"/>
<line x1="100" y1="48" x2="60" y2="74" stroke="black"/>
<line x1="100" y1="48" x2="140" y2="74" stroke="black"/>
</svg>`

}

/* ---------------- CONSTELLATION ENGINE ---------------- */

function generateConstellation(topic){

topic=topic.toLowerCase()

if(topic.includes("quantum")){
return [
"Quantum Mechanics",
"Bell's Theorem",
"Quantum Computing",
"Quantum Teleportation"
]
}

if(topic.includes("black hole")){
return [
"Event Horizon",
"Hawking Radiation",
"General Relativity",
"Singularity"
]
}

return ["History","Theory","Applications","Modern Research"]

}

/* ---------------- KNOWLEDGE ENGINE ---------------- */

function generateKnowledge(topic,category){

if(category==="physics"){

return{
title:topic,
definition:topic+" refers to a phenomenon studied in quantum physics.",
principle:"It involves interactions governed by quantum mechanical laws.",
history:"The concept emerged during early quantum theory research.",
application:"Important for quantum computing and cryptography.",
fact:"Einstein called quantum entanglement 'spooky action at a distance'."
}

}

return{
title:topic,
definition:topic+" is a subject studied across multiple domains.",
principle:"It involves mechanisms explaining how the system functions.",
history:"The topic developed through scientific research.",
application:"It influences modern science and technology.",
fact:"It remains an active area of investigation."
}

}

/* ---------------- INSIGHT ---------------- */

let currentBooklet=""

function showInsight(topic){

recordTrail(topic)
storeResearch(topic)

let category=classifyTopic(topic)

let data=generateKnowledge(topic,category)

document.getElementById("cardTitle").innerText=data.title
document.getElementById("definition").innerText=data.definition
document.getElementById("principle").innerText=data.principle
document.getElementById("history").innerText=data.history
document.getElementById("application").innerText=data.application
document.getElementById("fact").innerText=data.fact

document.getElementById("diagramArea").innerHTML=generateDiagram(topic)

/* constellation */

let constellation=document.getElementById("constellation")
constellation.innerHTML=""

let nodes=generateConstellation(topic)

nodes.forEach(n=>{

let node=document.createElement("div")
node.innerText="● "+n

node.onclick=()=>{
document.getElementById("topic").value=n
startResearch()
}

constellation.appendChild(node)

})

currentBooklet=generateBooklet(data,topic)

document.getElementById("resultModal").style.display="block"

}

/* ---------------- RESEARCH ---------------- */

function startResearch(){

let topic=document.getElementById("topic").value
if(topic==="") topic="Subject"

scanEye(()=>{showInsight(topic)})

}

/* ---------------- BOOKLET ---------------- */

function generateBooklet(data,topic){

let diagram=generateDiagram(topic)

let html="<html><body style='font-family:Georgia;background:#111;color:white;padding:40px'>"

html+="<h1>"+data.title+"</h1>"+diagram

html+="<h2>Definition</h2><p>"+data.definition+"</p>"
html+="<h2>Principle</h2><p>"+data.principle+"</p>"
html+="<h2>History</h2><p>"+data.history+"</p>"
html+="<h2>Applications</h2><p>"+data.application+"</p>"
html+="<h2>Interesting Fact</h2><p>"+data.fact+"</p>"

html+="</body></html>"

return html

}

function openBooklet(){
let win=window.open()
win.document.write(currentBooklet)
}

function closeResult(){document.getElementById("resultModal").style.display="none"}
function openCreator(){document.getElementById("creatorModal").style.display="block"}
function closeCreator(){document.getElementById("creatorModal").style.display="none"}

</script>

</body>
</html>
