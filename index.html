<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Einblick</title>

<link href="https://fonts.cdnfonts.com/css/neue-einstellung" rel="stylesheet">

<style>

/* GLOBAL */

body{

font-family:"Neue Einstellung",-apple-system,sans-serif;
margin:0;
background:linear-gradient(140deg,#0a0f16,#121a24,#0a0f16);
background-size:200% 200%;
animation:bgmove 30s infinite;
color:white;

}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* TOP NAV */

.topbar{

height:60px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #1f2937;

}

/* SIDEBAR */

.sidebar{

position:fixed;
top:60px;
left:0;
width:70px;
height:100%;
background:#0f141c;

display:flex;
flex-direction:column;
align-items:center;
gap:22px;
padding-top:25px;

}

/* NAV ICON */

.navIcon{

font-size:22px;
opacity:.7;
cursor:pointer;

}

.navIcon:hover{
opacity:1;
}

/* MAIN */

.main{

margin-left:70px;
padding:40px;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(4,320px);
gap:22px;
justify-content:center;

}

/* PANEL */

.panel{

width:320px;
height:198px;

background:#111827;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

font-size:36px;

cursor:pointer;

transition:.25s;

position:relative;

}

.panel:hover{

background:#1f2937;
transform:scale(1.02);

}

/* TOOLTIP */

.panel:hover::after{

content:attr(title);

position:absolute;

bottom:10px;

background:black;

padding:4px 8px;

font-size:12px;

border-radius:4px;

}

/* WIDGETS */

.widget{

width:320px;
height:198px;

background:#111827;

border-radius:14px;

padding:18px;

position:relative;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}

.widget:hover::after{

content:attr(title);

position:absolute;

bottom:10px;

background:black;

padding:4px 8px;

font-size:12px;

border-radius:4px;

}

/* CLOCK */

.clock{

width:110px;
height:110px;

border:4px solid white;

border-radius:50%;

position:relative;

}

.hand{

position:absolute;
width:2px;
height:40px;

background:white;

top:15px;
left:50%;

transform-origin:bottom;

}

/* SEARCH */

.search{

width:900px;

margin:40px auto;

display:flex;

background:#1f2937;

border-radius:16px;

overflow:hidden;

}

.search input{

flex:1;

border:none;

padding:18px;

background:transparent;

color:white;

font-size:15px;

}

.search button{

border:none;

background:#374151;

padding:0 20px;

color:white;

cursor:pointer;

}

/* GAME MENU */

.hidden{

display:none;

}

</style>

</head>

<body>

<div class="topbar">

Einblick

</div>

<div class="sidebar">

<div class="navIcon">👁</div>
<div class="navIcon">🔍</div>
<div class="navIcon">🔬</div>
<div class="navIcon">🧰</div>
<div class="navIcon">📚</div>
<div class="navIcon">❤️</div>
<div class="navIcon">🎮</div>
<div class="navIcon">⚙</div>

</div>

<div class="main">

<!-- OBSERVATION WIDGETS -->

<div class="grid">

<div class="widget" title="Chronometer">

<div class="clock">
<div class="hand" id="hand"></div>
</div>

</div>

<div class="widget" title="Calendar">

<div id="date"></div>

</div>

<div class="widget" title="News">

<div id="news">Loading news...</div>

</div>

<div class="widget" title="Weather">

<div id="weather">Loading weather...</div>

</div>

</div>

<!-- SEARCH -->

<div class="search">

<button>+</button>

<input placeholder="Ask Ein anything">

<button>Search</button>

</div>

<!-- PANELS -->

<div class="grid">

<div class="panel" title="Insight">💡</div>

<div class="panel" title="Research">🔬</div>

<div class="panel" title="Instruments">🧰</div>

<div class="panel" title="Studies">📚</div>

<div class="panel" title="Health">❤️</div>

<div class="panel" title="Pursuits" onclick="togglePursuits()">🎮</div>

<div class="panel" title="Preferences">⚙</div>

<div class="panel" title="System">🖥</div>

</div>

<!-- PURSUITS MENU -->

<div id="pursuitsMenu" class="hidden">

<h3>Reading Room</h3>

Books<br>
Saved Articles<br>
Reading Lists

<h3>Gaming Room</h3>

Chess<br>
Tic Tac Toe<br>
Spider Solitaire<br>
Solitaire Foundations<br>
Clock Solitaire<br>
Snake

</div>

</div>

<script>

/* CLOCK */

function updateClock(){

let now=new Date()

let sec=now.getSeconds()

let angle=sec*6

document.getElementById("hand").style.transform="rotate("+angle+"deg)"

}

setInterval(updateClock,1000)

/* DATE */

let d=new Date()

document.getElementById("date").innerText=
d.toDateString()

/* PURSUITS */

function togglePursuits(){

let m=document.getElementById("pursuitsMenu")

if(m.classList.contains("hidden"))
m.classList.remove("hidden")
else
m.classList.add("hidden")

}

</script>

</body>

</html>
