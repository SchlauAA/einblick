<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EINBLICK</title>

<link href="https://fonts.cdnfonts.com/css/neue-einstellung" rel="stylesheet">

<style>

:root{
--widget:150px;
--icon:120px;
--space-xl:80px;
--space-md:24px;

--bg:#050505;
--panel:#0b0b0b;
--border:rgba(255,255,255,0.06);

--text:#e6e6e6;
--muted:#8c8c8c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Neue Einstellung",sans-serif;
}

body{
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
overflow-x:hidden;
}

/* wallpaper */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:120%;
height:120%;
background:
linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
background-size:60px 60px;
z-index:-1;
transition:transform .15s ease;
}

.container{
width:92%;
max-width:900px;
display:flex;
flex-direction:column;
gap:var(--space-xl);
padding:90px 40px;
border:1px solid var(--border);
border-radius:18px;
background:rgba(10,10,10,.9);
}

.zone{
width:100%;
max-width:900px;
margin:auto;
}

/* eye */

.logo-eye{
display:flex;
justify-content:center;
margin-bottom:12px;
}

.eye{
width:80px;
height:50px;
border:1.5px solid rgba(255,255,255,0.35);
border-radius:50px/30px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
background:rgba(255,255,255,0.02);
}

.pupil{
width:14px;
height:14px;
background:white;
border-radius:50%;
position:absolute;
transition:transform .15s ease, box-shadow .3s ease;

box-shadow:
0 0 6px rgba(255,255,255,0.8),
0 0 12px rgba(255,255,255,0.4);
}

.eye.idle .pupil{
animation:breathing 4s infinite;
}

@keyframes breathing{
0%{box-shadow:0 0 6px rgba(255,255,255,0.4)}
50%{box-shadow:0 0 14px rgba(255,255,255,0.9)}
100%{box-shadow:0 0 6px rgba(255,255,255,0.4)}
}

/* widgets */

.widget-row{
display:grid;
grid-template-columns:repeat(4,var(--widget));
justify-content:center;
gap:var(--space-md);
}

.widget{
width:var(--widget);
height:var(--widget);
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:.2s transform ease;
}

.widget:hover{
transform:translateY(-4px);
}

/* weather */

.weather-icon{
font-size:42px;
animation:weatherMove 6s infinite ease-in-out;
}

@keyframes weatherMove{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* panels */

.panel-grid{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
}

.panel{
width:var(--icon);
height:var(--icon);
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s;
position:relative;
}

.panel:hover{
transform:translateY(-4px);
border-color:rgba(255,255,255,.2);
}

/* icon animations */

.panel:hover svg{
animation:iconPulse .6s ease;
}

@keyframes iconPulse{
0%{transform:scale(1)}
50%{transform:scale(1.12)}
100%{transform:scale(1)}
}

/* workspace */

.workspace{
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:28px;
transition:opacity .35s ease, transform .35s ease;
}

.workspace.fade{
opacity:0;
transform:translateY(20px);
}

/* knowledge graph */

.graph{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.node{
width:12px;
height:12px;
border-radius:50%;
background:white;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.6)}
100%{transform:scale(1)}
}

/* reflection */

.reflection{
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:28px;
text-align:center;
}

.reflection-title{
color:var(--muted);
margin-bottom:12px;
}

.footer{
text-align:center;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<div class="zone">

<div class="logo-eye">
<div class="eye idle" id="eye">
<div class="pupil" id="pupil"></div>
</div>
</div>

<div class="brand-name">EINBLICK</div>
<div class="slogan">Where Knowledge Becomes Insight</div>

</div>

<div class="zone widget-row">

<div class="widget">
<div id="digital"></div>
</div>

<div class="widget" id="calendar"></div>

<div class="widget">News</div>

<div class="widget">
<div class="weather-icon">☀</div>
</div>

</div>

<div class="zone">

<div class="search-panel">
<div class="attach">📎</div>
<input id="searchInput" class="search-input" placeholder="Search Einblick">
<button class="search-btn">Search</button>
</div>

</div>

<div class="zone workspace" id="workspace">

<h2>Workspace</h2>

<p style="color:var(--muted);margin-top:10px">
Ready for research.
</p>

<div class="graph">
<div class="node"></div>
<div class="node"></div>
<div class="node"></div>
</div>

</div>

<div class="zone panel-grid">

<div class="panel">
<div class="panel-title">Knowledge</div>
</div>

<div class="panel">
<div class="panel-title">Discovery</div>
</div>

<div class="panel">
<div class="panel-title">Life</div>
</div>

<div class="panel">
<div class="panel-title">Control</div>
</div>

</div>

<div class="zone reflection">

<div class="reflection-title">Today's Reflection</div>

<div id="quote">
"Equipped with his five senses, man explores the universe around him."
</div>

<div style="margin-top:12px;color:var(--muted)">
— Edwin Hubble
</div>

</div>

<div class="zone footer">
Created by Dr. Aishvarya Adhaulia
</div>

</div>

<script>

/* parallax */

document.addEventListener("mousemove",e=>{
const x=(e.clientX/window.innerWidth)-0.5
const y=(e.clientY/window.innerHeight)-0.5
document.body.style.transform=`translate(${x*4}px,${y*4}px)`
})

/* eye states */

const pupil=document.getElementById("pupil")
const eye=document.getElementById("eye")
const search=document.getElementById("searchInput")

search.addEventListener("focus",()=>{
pupil.style.transform="scale(1.5)"
})

search.addEventListener("blur",()=>{
pupil.style.transform="scale(1)"
})

/* clock */

function updateClock(){
const now=new Date()
document.getElementById("digital").textContent=now.toLocaleTimeString()
}
setInterval(updateClock,1000)
updateClock()

/* calendar */

const now=new Date()
document.getElementById("calendar").innerHTML=`
<div style="text-align:center">
<div style="font-size:11px;color:#aaa">${now.toLocaleDateString(undefined,{weekday:'long'})}</div>
<div style="font-size:40px">${now.getDate()}</div>
<div style="font-size:12px;color:#aaa">${now.toLocaleDateString(undefined,{month:'short'})} ${now.getFullYear()}</div>
</div>
`

/* search animation */

const workspace=document.getElementById("workspace")
document.querySelector(".search-btn").onclick=()=>{
workspace.classList.add("fade")
setTimeout(()=>workspace.classList.remove("fade"),400)
}

/* reflection rotation */

const quotes=[
["The important thing is not to stop questioning.","Albert Einstein"],
["Equipped with his five senses, man explores the universe.","Edwin Hubble"],
["Somewhere, something incredible is waiting to be known.","Carl Sagan"]
]

setInterval(()=>{
const q=quotes[Math.floor(Math.random()*quotes.length)]
document.getElementById("quote").innerText=`"${q[0]}" — ${q[1]}`
},15000)

</script>

</body>
</html>
