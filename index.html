<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EINBLICK</title>

<link href="https://fonts.cdnfonts.com/css/neue-einstellung" rel="stylesheet">

<style>

:root{

--widget-size:150px;
--panel-size:120px;

--space-xl:80px;
--space-lg:48px;
--space-md:24px;

--bg:#050505;
--panel:#0b0b0b;

--border:rgba(255,255,255,0.06);
--text:#e6e6e6;
--muted:#8c8c8c;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Neue Einstellung",sans-serif;
}

body{

background:var(--bg);
color:var(--text);

display:flex;
justify-content:center;

}

/* subtle dynamic wallpaper */

body::before{

content:"";

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);

background-size:60px 60px;

opacity:.5;

z-index:-1;

}

/* container */

.container{

width:92%;
max-width:900px;

display:flex;
flex-direction:column;

gap:var(--space-xl);

padding:90px 40px;

border:1px solid var(--border);
border-radius:18px;

background:rgba(10,10,10,.9);

}

/* eye */

.logo-eye{
display:flex;
justify-content:center;
}

.eye{

width:80px;
height:50px;

border:1px solid var(--border);

border-radius:50px/30px;

display:flex;
align-items:center;
justify-content:center;

position:relative;

}

.pupil{

width:14px;
height:14px;

background:white;

border-radius:50%;

position:absolute;

}

/* brand */

.brand-name{

text-align:center;

font-size:36px;
letter-spacing:3px;

}

.slogan{

text-align:center;
color:var(--muted);

margin-top:6px;

}

/* widgets */

.widget-row{

display:grid;

grid-template-columns:repeat(4,var(--widget-size));

justify-content:center;

gap:var(--space-md);

}

.widget{

width:var(--widget-size);
height:var(--widget-size);

background:var(--panel);

border:1px solid var(--border);

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

transition:.2s;

}

.widget:hover{

border-color:rgba(255,255,255,0.2);
transform:translateY(-2px);

}

/* clock */

.clock{

width:70px;
height:70px;

border:1px solid var(--border);

border-radius:50%;

position:relative;

}

.hand{

position:absolute;

bottom:50%;
left:50%;

transform-origin:center bottom;

background:white;

}

.hour{width:2px;height:18px}
.minute{width:2px;height:26px}
.second{width:1px;height:30px}

/* search */

.search-panel{

display:flex;

background:var(--panel);

border:1px solid var(--border);

border-radius:12px;

overflow:hidden;

}

.attach{

width:60px;

display:flex;
align-items:center;
justify-content:center;

}

.search-input{

flex:1;

background:transparent;

border:none;

color:white;

padding:16px;

}

.search-btn{

width:120px;

background:#111;

border:none;

color:white;

cursor:pointer;

}

/* workspace */

.workspace{

background:var(--panel);

border:1px solid var(--border);

border-radius:12px;

padding:28px;

}

/* panel icons */

.panel-grid{

display:grid;

grid-template-columns:repeat(4,var(--panel-size));

justify-content:center;

gap:var(--space-md);

}

.panel{

width:var(--panel-size);
height:var(--panel-size);

background:var(--panel);

border:1px solid var(--border);

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

transition:.2s;

}

.panel:hover{

border-color:rgba(255,255,255,.2);
transform:translateY(-2px);

}

.panel svg{

width:36px;
height:36px;

stroke:white;
stroke-width:1.4;

fill:none;

}

/* reflection */

.reflection{

background:var(--panel);

border:1px solid var(--border);

border-radius:12px;

padding:28px;

text-align:center;

font-style:italic;

}

/* footer */

.footer{

text-align:center;
color:#777;

}

</style>

</head>

<body>

<div class="container">

<div class="logo-eye">
<div class="eye">
<div class="pupil"></div>
</div>
</div>

<div class="brand-name">EINBLICK</div>

<div class="slogan">
Where Knowledge Becomes Insight
</div>

<div class="widget-row">

<div class="widget">

<div class="clock">

<div class="hand hour"></div>
<div class="hand minute"></div>
<div class="hand second"></div>

</div>

</div>

<div class="widget">Calendar</div>
<div class="widget">News</div>
<div class="widget">Weather</div>

</div>

<div class="search-panel">

<div class="attach">📎</div>

<input class="search-input" placeholder="Search Einblick">

<button class="search-btn">
Search
</button>

</div>

<div class="workspace">

<h2>Workspace</h2>

<p style="color:var(--muted);margin-top:10px">
Ready for research.
</p>

</div>

<div class="panel-grid">

<div class="panel">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<circle cx="5" cy="12" r="2"/>
<circle cx="19" cy="12" r="2"/>
</svg>

</div>

<div class="panel">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<line x1="12" y1="12" x2="18" y2="6"/>
</svg>

</div>

<div class="panel">

<svg viewBox="0 0 24 24">
<line x1="12" y1="3" x2="12" y2="21"/>
<polyline points="6 15 12 21 18 15"/>
</svg>

</div>

<div class="panel">

<svg viewBox="0 0 24 24">
<line x1="4" y1="6" x2="20" y2="6"/>
<line x1="4" y1="12" x2="20" y2="12"/>
<line x1="4" y1="18" x2="20" y2="18"/>
</svg>

</div>

</div>

<div class="reflection">

"If space-time bends under gravity, what might a universe without mass look like?"

</div>

<div class="footer">

Created by Dr. Aishvarya Adhaulia

</div>

</div>

</body>
</html>
