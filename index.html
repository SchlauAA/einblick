<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Einblick</title>

<link href="https://fonts.cdnfonts.com/css/neue-einstellung" rel="stylesheet">

<style>

body{
font-family:"Neue Einstellung",-apple-system,sans-serif;
background:#0a0f16;
color:white;
margin:0;
text-align:center;
padding:60px;
}

/* EYE */

.eye{
width:120px;
height:70px;
border:2px solid white;
border-radius:60px/35px;
margin:auto;
position:relative;
animation:blink 7s infinite, glow 5s infinite;
}

.pupil{
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

@keyframes blink{
0%,95%,100%{height:70px}
97%{height:6px}
}

@keyframes glow{
0%{box-shadow:0 0 4px rgba(255,255,255,.2)}
50%{box-shadow:0 0 18px rgba(255,255,255,.5)}
100%{box-shadow:0 0 4px rgba(255,255,255,.2)}
}

/* BRAND */

.brand h1{
font-size:42px;
margin:10px;
}

.brand h2{
font-weight:400;
opacity:.85;
margin:4px;
}

/* WIDGETS */

.widgets{
display:flex;
justify-content:center;
gap:40px;
margin-top:70px;
}

.widget{
width:320px;
height:198px;
background:#111827;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
}

/* SEARCH */

.search{
margin-top:70px;
}

.search input{
width:420px;
padding:14px;
}

.search button{
padding:14px 22px;
}

/* INSIGHT */

.insight{
margin-top:30px;
opacity:.8;
font-style:italic;
}

/* PANELS */

.panels{
display:flex;
gap:20px;
justify-content:center;
margin-top:70px;
overflow-x:auto;
}

.panel{
width:200px;
height:124px;
background:#111827;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.panel:hover{
transform:translateY(-4px);
}

/* HOVER NAME */

.panel:hover::after{
content:attr(data-name);
position:absolute;
bottom:-18px;
font-size:12px;
opacity:.7;
}

/* ICON */

.icon{
font-size:28px;
animation:iconPulse 6s infinite;
}

@keyframes iconPulse{
0%{opacity:.8;transform:scale(1)}
50%{opacity:1;transform:scale(1.08)}
100%{opacity:.8;transform:scale(1)}
}

/* FOOTER */

.footer{
margin-top:80px;
opacity:.6;
font-size:14px;
}

</style>

</head>

<body>

<!-- AI EYE -->

<div class="eye">
<div class="pupil"></div>
</div>

<!-- BRAND -->

<div class="brand">

<h1>Einblick</h1>

<h2>Where Knowledge Becomes Insight</h2>

</div>

<!-- WIDGETS -->

<div class="widgets">

<div class="widget">
<canvas id="clock" width="150" height="150"></canvas>
</div>

<div class="widget">
<div id="calendar"></div>
</div>

<div class="widget">
<div id="news">News</div>
</div>

<div class="widget">
<div id="weather">Weather</div>
</div>

</div>

<!-- SEARCH -->

<div class="search">

<input id="query" placeholder="Ask Ein anything">

<button id="searchBtn">Search</button>

</div>

<!-- TODAY INSIGHT -->

<div class="insight" id="todayInsight">

Today's Insight — Curiosity is the engine of discovery.

</div>

<!-- PANELS -->

<div class="panels">

<div class="panel" data-name="Insight">
<div class="icon">💡</div>
</div>

<div class="panel" data-name="Research">
<div class="icon">🔬</div>
</div>

<div class="panel" data-name="Learning">
<div class="icon">📚</div>
</div>

<div class="panel" data-name="Instruments">
<div class="icon">🧭</div>
</div>

<div class="panel" data-name="Health">
<div class="icon">❤️</div>
</div>

<div class="panel" data-name="Pursuits">
<div class="icon">🎯</div>
</div>

<div class="panel" data-name="Preferences">
<div class="icon">⚙</div>
</div>

<div class="panel" data-name="System">
<div class="icon">🖥</div>
</div>

</div>

<!-- FOOTER -->

<div class="footer">

Created by Dr. Aishvarya Adhaulia

</div>

<script>

/* CLOCK */

function drawClock(){

let canvas=document.getElementById("clock")
let ctx=canvas.getContext("2d")

let r=canvas.height/2
ctx.translate(r,r)

setInterval(function(){

ctx.clearRect(-r,-r,canvas.width,canvas.height)

let now=new Date()

let sec=now.getSeconds()
let min=now.getMinutes()
let hr=now.getHours()%12

drawHand(hr*Math.PI/6 + min*Math.PI/360,50,5)
drawHand(min*Math.PI/30,70,3)
drawHand(sec*Math.PI/30,80,1)

function drawHand(angle,length,width){

ctx.beginPath()
ctx.lineWidth=width
ctx.moveTo(0,0)
ctx.rotate(angle)
ctx.lineTo(0,-length)
ctx.stroke()
ctx.rotate(-angle)

}

},1000)

}

drawClock()

/* CALENDAR */

document.getElementById("calendar").innerText =
new Date().toDateString()

/* SEARCH */

let pressTimer

document.getElementById("searchBtn").addEventListener("mousedown",function(){

pressTimer=setTimeout(function(){

alert("Inquiry mode activated")

},1200)

})

document.getElementById("searchBtn").addEventListener("mouseup",function(){

clearTimeout(pressTimer)

})

document.getElementById("searchBtn").onclick=function(){

let q=document.getElementById("query").value

document.getElementById("todayInsight").innerText =
"Insight generated for: "+q

}

</script>

</body>

</html>
