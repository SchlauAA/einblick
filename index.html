<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EINBLICK</title>

<style>

body{
margin:0;
font-family:"Neue Einstellung",sans-serif;
color:#EAEAEA;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;

background:
radial-gradient(
circle at center,
rgba(255,255,255,0.06) 0%,
rgba(255,255,255,0.02) 20%,
#0B0B0C 60%
);
}

/* HEADER */

header{
margin-top:80px;
display:flex;
flex-direction:column;
align-items:center;
gap:32px;
}

/* EYE */

.eye{
width:140px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
animation:blink 7s infinite;
}

@keyframes blink{
0%,92%,100%{transform:scaleY(1)}
95%{transform:scaleY(.08)}
}

/* pupil breathing glow */

@keyframes breathe{
0%{filter:drop-shadow(0 0 3px rgba(255,255,255,.25))}
50%{filter:drop-shadow(0 0 10px rgba(255,255,255,.6))}
100%{filter:drop-shadow(0 0 3px rgba(255,255,255,.25))}
}

#pupil{
animation:breathe 4.5s ease-in-out infinite;
transition:all .25s ease;
}

#pupil.active{
transform:scale(1.6);
filter:drop-shadow(0 0 14px white);
}

/* TITLE */

h1{
margin:0;
font-weight:500;
letter-spacing:0.22em;
text-shadow:0 0 8px rgba(255,255,255,0.08);
margin-top:-6px;
}

/* GENERATOR */

.generator{
margin-top:56px;
display:flex;
flex-direction:column;
align-items:center;
gap:28px;
width:100%;
max-width:480px;
}

/* CONSOLE INPUT */

input{
width:100%;
background:transparent;
border:none;
border-bottom:1px solid #333;
padding:14px 0;
font-size:16px;
color:#EAEAEA;
text-align:center;
}

input:focus{
outline:none;
border-bottom:1px solid white;
box-shadow:0 2px 6px rgba(255,255,255,0.2);
}

/* BUTTON */

button{
width:100%;
padding:16px;
border-radius:6px;
border:none;
background:#EAEAEA;
color:#000;
font-weight:600;
letter-spacing:0.05em;
cursor:pointer;
transition:transform .12s ease;
}

button:active{
transform:scale(0.96);
}

/* MODALS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(6px);
z-index:10;
}

.modal-content{
background:#111;
margin:10% auto;
padding:40px;
border-radius:12px;
width:90%;
max-width:600px;
color:white;
position:relative;
opacity:0;
transform:translateY(20px);
transition:all .35s ease;
}

.modal-content.active{
opacity:1;
transform:translateY(0);
}

.close{
position:absolute;
top:18px;
right:24px;
font-size:22px;
cursor:pointer;
}

/* POSTER */

.poster-preview{
margin:30px 0;
height:240px;
border:1px solid #333;
display:flex;
align-items:center;
justify-content:center;
background:#F4F1E8;
color:black;
}

/* FOOTER */

footer{
margin-top:auto;
padding:60px;
font-size:14px;
opacity:.6;
}

.creator{
cursor:pointer;
transition:opacity .25s ease;
}

.creator-name{
opacity:0;
margin-left:6px;
transition:opacity .25s ease;
}

.creator:hover .creator-name{
opacity:1;
}

.creator:hover{
opacity:1;
}

</style>
</head>

<body>

<header>

<div class="eye">

<svg width="140" height="90" viewBox="0 0 140 90">

<ellipse
cx="70"
cy="45"
rx="55"
ry="25"
stroke="white"
stroke-width="2"
fill="none"
/>

<circle
cx="70"
cy="45"
r="8"
fill="white"
id="pupil"
/>

</svg>

</div>

<h1>EINBLICK</h1>

</header>

<div class="generator">

<input id="topic" placeholder="Subject">

<button onclick="startResearch()">Research</button>

</div>

<!-- RESULT MODAL -->

<div id="resultModal" class="modal">

<div class="modal-content" id="resultContent">

<span class="close" onclick="closeResult()">×</span>

<h2 id="resultTitle">Result</h2>

<div class="poster-preview">

Insight Poster

</div>

<button>Open Booklet</button>

</div>

</div>

<!-- CREATOR MODAL -->

<div id="creatorModal" class="modal">

<div class="modal-content" id="creatorContent">

<span class="close" onclick="closeCreator()">×</span>

<h2>Creator</h2>

<p>Dr. Aishvarya Adhaulia</p>

<p>Founder of Einblick</p>

</div>

</div>

<footer>

<span class="creator" onclick="openCreator()">

<span class="creator-label">Creator</span>
<span class="creator-name">Dr. Aishvarya Adhaulia</span>

</span>

</footer>

<script>

/* pupil tracking */

const pupil=document.getElementById("pupil")

document.addEventListener("mousemove",e=>{

const rect=pupil.ownerSVGElement.getBoundingClientRect()

const centerX=rect.left+rect.width/2
const centerY=rect.top+rect.height/2

const dx=(e.clientX-centerX)/25
const dy=(e.clientY-centerY)/25

pupil.setAttribute("cx",70+dx)
pupil.setAttribute("cy",45+dy)

})

/* research sequence */

function startResearch(){

let topic=document.getElementById("topic").value

if(topic==="") topic="Subject"

document.getElementById("resultTitle").innerText=topic

pupil.classList.add("active")

setTimeout(()=>{
pupil.classList.remove("active")
},800)

setTimeout(()=>{

document.getElementById("resultModal").style.display="block"

setTimeout(()=>{
document.getElementById("resultContent").classList.add("active")
},10)

},350)

}

/* close result */

function closeResult(){

document.getElementById("resultModal").style.display="none"
document.getElementById("resultContent").classList.remove("active")

}

/* creator popup */

function openCreator(){

document.getElementById("creatorModal").style.display="block"

setTimeout(()=>{
document.getElementById("creatorContent").classList.add("active")
},10)

}

function closeCreator(){

document.getElementById("creatorModal").style.display="none"
document.getElementById("creatorContent").classList.remove("active")

}

/* ENTER key trigger */

document.getElementById("topic").addEventListener("keydown",function(e){

if(e.key==="Enter") startResearch()

})

</script>

</body>
</html>
